<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Лес Мишкана</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'VT323',monospace;color:#c8d8b0;user-select:none;}

.screen{display:none;width:100%;height:100%;position:fixed;top:0;left:0;z-index:10;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#screen-game{background:#000;}
#screen-game.active{display:block !important;}

#screen-title{background:radial-gradient(ellipse at center,#0d1f0d 0%,#000 70%);}
#screen-title h1{font-family:'Creepster',cursive;font-size:clamp(2.5rem,8vw,5rem);color:#ff3030;text-shadow:0 0 20px #ff000088,0 0 40px #ff000044;letter-spacing:4px;animation:flicker 3s infinite;text-align:center;padding:0 1rem;}
#screen-title p{font-size:1.2rem;color:#6a8a6a;margin:.5rem 0 2rem;text-align:center;}
@keyframes flicker{0%,95%,100%{opacity:1;}96%{opacity:.4;}97%{opacity:1;}98%{opacity:.2;}}

.btn{background:transparent;border:2px solid #ff3030;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.7rem 2rem;margin:.4rem;cursor:pointer;letter-spacing:2px;transition:all .2s;min-width:200px;text-align:center;}
.btn:hover,.btn:active{background:#ff3030;box-shadow:0 0 20px #ff3030;}
.btn-green{border-color:#4a8a4a;}
.btn-green:hover,.btn-green:active{background:#2d6b2d;box-shadow:0 0 20px #4a8a4a;}
input.inp{background:#111;border:2px solid #3a5a3a;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.6rem 1rem;margin:.4rem;width:220px;text-align:center;outline:none;letter-spacing:2px;}
input.inp:focus{border-color:#ff3030;}

#screen-lobby{background:radial-gradient(ellipse at center,#0d1a0d 0%,#000 80%);}
#lobby-code{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;letter-spacing:8px;text-shadow:0 0 15px #ff000066;margin:.5rem 0;}
#lobby-players{width:90%;max-width:350px;margin:1rem 0;}
.lobby-player{display:flex;align-items:center;background:#111;border:1px solid #2a3a2a;padding:.5rem 1rem;margin:.3rem 0;border-radius:4px;}
.player-dot{width:14px;height:14px;border-radius:50%;margin-right:.7rem;flex-shrink:0;}

/* ── ИГРОВОЙ CANVAS ── */
#gc{position:fixed;top:0;left:0;display:block;touch-action:none;z-index:2;image-rendering:pixelated;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:5;}
#hud-players{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;}
.hud-player{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:16px;padding:3px 8px;}
.hud-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-family:'Creepster',cursive;color:#000;font-weight:bold;flex-shrink:0;position:relative;}
.hud-avatar.caught::after{content:'✕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);border-radius:50%;color:#ff3030;font-size:1rem;}
.hud-hp-bar{width:46px;height:5px;background:#333;border-radius:3px;overflow:hidden;}
.hud-hp-fill{height:100%;background:#4a8a4a;border-radius:3px;}
.hud-name{font-size:.72rem;color:#888;}

#hud-stamina{position:absolute;bottom:155px;left:15px;display:flex;flex-direction:column;gap:3px;}
.bar-label{font-size:.75rem;color:#888;letter-spacing:1px;}
.bar-track{width:90px;height:7px;background:#222;border-radius:4px;overflow:hidden;border:1px solid #333;}
.bar-fill{height:100%;border-radius:4px;}
#stamina-fill{background:linear-gradient(90deg,#2a6a2a,#5aff5a);}
#adrenaline-fill{background:linear-gradient(90deg,#aa6600,#ffcc00);}
#adrenaline-bar{margin-top:2px;display:none;}

#hud-pages{position:absolute;bottom:155px;right:15px;display:flex;gap:5px;}
.page-icon{width:20px;height:26px;border:2px solid #444;border-radius:2px;background:#111;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#444;transition:all .3s;}
.page-icon.collected{border-color:#c8a84a;background:#2a1f0a;color:#c8a84a;}

#bobik-msg{position:absolute;bottom:190px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #3a5a3a;border-radius:8px;padding:7px 14px;max-width:80vw;font-size:.95rem;color:#ffe08a;text-align:center;opacity:0;transition:opacity .5s;pointer-events:none;white-space:nowrap;}
#bobik-msg.show{opacity:1;}
#bobik-msg::before{content:'🟡 Бобик: ';}

#near-item{position:absolute;bottom:205px;left:50%;transform:translateX(-50%);background:rgba(200,168,74,.15);border:1px solid #c8a84a;border-radius:6px;padding:4px 12px;font-size:.9rem;color:#c8a84a;display:none;pointer-events:none;}
#exit-indicator{position:absolute;top:40%;left:50%;transform:translateX(-50%);background:rgba(74,200,74,.15);border:1px solid #4ac84a;border-radius:6px;padding:4px 12px;font-size:.9rem;color:#4ac84a;display:none;pointer-events:none;}
#exit-arrow{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:1rem;color:#4ac84a;display:none;pointer-events:none;background:rgba(0,0,0,.55);padding:2px 10px;border-radius:6px;}

#caught-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(139,0,0,.9);border:2px solid #ff3030;border-radius:8px;padding:14px 22px;font-family:'Creepster',cursive;font-size:1.5rem;color:#fff;text-align:center;display:none;z-index:20;}
#distance-to-heal{font-size:.95rem;color:#ffaaaa;margin-top:4px;}

/* Оверлеи */
#overlay-red{position:fixed;inset:0;background:rgba(139,0,0,0);pointer-events:none;transition:background .3s;z-index:6;}
#overlay-red.active{background:rgba(139,0,0,.5);}
#overlay-pulse{position:fixed;inset:0;pointer-events:none;z-index:6;}
#overlay-pulse.beating{animation:hb .6s ease-in-out infinite;}
@keyframes hb{0%,100%{box-shadow:inset 0 0 0 rgba(255,0,0,0);}50%{box-shadow:inset 0 0 60px rgba(255,0,0,.4);}}
#overlay-screamer{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:100;}
#overlay-screamer.show{display:flex;animation:shk .5s;}
#overlay-screamer img{width:100%;height:100%;object-fit:cover;filter:saturate(.3) contrast(1.5);}
@keyframes shk{0%,100%{transform:translate(0,0);}15%{transform:translate(-8px,6px) rotate(-2deg);}35%{transform:translate(8px,-6px) rotate(2deg);}55%{transform:translate(-4px,3px);}75%{transform:translate(3px,-2px);}}

/* ── УПРАВЛЕНИЕ ── */
#controls{position:fixed;bottom:10px;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 14px;pointer-events:none;z-index:8;}
#joystick-zone{width:120px;height:120px;pointer-events:all;position:relative;flex-shrink:0;}
#joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.18);}
#joystick-knob{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.45);top:50%;left:50%;transform:translate(-50%,-50%);}
.action-btns{display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:all;}
.action-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;-webkit-tap-highlight-color:transparent;color:#c8d8b0;font-family:'VT323',monospace;pointer-events:all;}
.action-btn:active{background:rgba(255,255,255,.25);}
#btn-interact{border-color:#c8a84a;}
#btn-sprint{border-color:#4a8a4a;}

#screen-end{background:radial-gradient(ellipse at center,#1a0000 0%,#000 70%);z-index:200;}
#screen-end h1{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;text-shadow:0 0 20px #ff000088;text-align:center;margin-bottom:1rem;}
#screen-end p{color:#888;font-size:1.2rem;text-align:center;margin-bottom:1.5rem;}
</style>
</head>
<body>

<div id="screen-title" class="screen active">
  <h1>ЛЕС<br>МИШКАНА</h1>
  <p>horror · multiplayer · forest</p>
  <button class="btn" onclick="showCreate()">СОЗДАТЬ ЛОББИ</button>
  <button class="btn btn-green" onclick="showJoin()">ВОЙТИ В ЛОББИ</button>
</div>

<div id="screen-create" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030;margin-bottom:1rem">СОЗДАТЬ ЛОББИ</h2>
  <input class="inp" id="inp-create-name" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
  <button class="btn" onclick="createLobby()">СОЗДАТЬ</button>
  <button class="btn btn-green" onclick="showScreen('screen-title')" style="margin-top:.5rem">НАЗАД</button>
</div>

<div id="screen-join" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030;margin-bottom:1rem">ВОЙТИ В ЛОББИ</h2>
  <input class="inp" id="inp-join-name" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
  <input class="inp" id="inp-join-code" placeholder="КОД ЛОББИ" maxlength="4" style="text-transform:uppercase;letter-spacing:6px">
  <button class="btn" onclick="joinLobby()">ВОЙТИ</button>
  <button class="btn btn-green" onclick="showScreen('screen-title')" style="margin-top:.5rem">НАЗАД</button>
  <p id="join-error" style="color:#ff3030;font-size:1rem;margin-top:.5rem"></p>
</div>

<div id="screen-lobby" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030">ЛОББИ</h2>
  <p style="color:#666;font-size:1rem;margin-bottom:.3rem">Код для друзей:</p>
  <div id="lobby-code">----</div>
  <p style="color:#666;font-size:.9rem;margin-bottom:1rem">Поделись кодом в чате</p>
  <div id="lobby-players"></div>
  <button class="btn" id="btn-start" onclick="startGame()" style="display:none;margin-top:1rem">НАЧАТЬ ИГРУ</button>
  <p style="color:#556655;font-size:.9rem;margin-top:.5rem" id="lobby-wait-msg">Ожидание хоста...</p>
</div>

<div id="screen-game" class="screen">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div id="hud-players"></div>
    <div id="hud-stamina">
      <span class="bar-label">СТАМИНА</span>
      <div class="bar-track"><div class="bar-fill" id="stamina-fill" style="width:100%"></div></div>
      <div id="adrenaline-bar">
        <span class="bar-label">АДРЕНАЛИН</span>
        <div class="bar-track"><div class="bar-fill" id="adrenaline-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div id="hud-pages">
      <div class="page-icon" id="page-0">📄</div>
      <div class="page-icon" id="page-1">📄</div>
      <div class="page-icon" id="page-2">📄</div>
      <div class="page-icon" id="page-3">📄</div>
    </div>
    <div id="near-item">[ E ] Взять</div>
    <div id="exit-indicator">🚪 ВЫХОД — нажми E</div>
    <div id="exit-arrow"></div>
    <div id="bobik-msg"></div>
    <div id="caught-msg">
      😵 ТЫ ПОЙМАН МИШКАНОМ!<br>
      <div id="distance-to-heal">Жди помощи...</div>
    </div>
  </div>
  <div id="overlay-red"></div>
  <div id="overlay-pulse"></div>
  <div id="overlay-screamer">
    <img src="https://image2url.com/r2/default/files/1775503421307-9e71057d-b620-4800-9c13-8e055aeefc40.jpg" alt="">
  </div>
  <div id="controls">
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>
    <div class="action-btns">
      <button class="action-btn" id="btn-interact">E</button>
      <button class="action-btn" id="btn-sprint">⚡</button>
    </div>
  </div>
</div>

<div id="screen-end" class="screen">
  <h1 id="end-title">ИГРА ОКОНЧЕНА</h1>
  <p id="end-msg"></p>
  <button class="btn" onclick="location.reload()">В ГЛАВНОЕ МЕНЮ</button>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════
const AUDIO={};let audioCtx=null;
function initAudio(){
  AUDIO.bg=new Audio('https://image2url.com/r2/default/files/1775502743982-2a4e8ee7-3dfd-4bed-a35e-2fa1db366b96.m4a');
  AUDIO.bg.loop=true;AUDIO.bg.volume=0.15;
  AUDIO.zoom=new Audio('https://image2url.com/r2/default/files/1775503673618-4ef1e1d3-066a-4e58-8442-2f4a80b8fc52.mp3');
  AUDIO.zoom.volume=0.9;
  AUDIO.scream=new Audio('https://image2url.com/r2/default/files/1775503545113-70bfeb3a-77a6-48ad-8ebe-e2639c1e2b77.mp3');
  AUDIO.caught=new Audio('https://image2url.com/r2/default/files/1775503969660-11d003f6-bf69-4148-bb38-965ed4f0808b.mp3');
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function playFootstep(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*.055),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/700)*.35;
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  g.gain.value=.28;src.buffer=buf;src.connect(g);g.connect(audioCtx.destination);src.start();
}
function playAudio(k){if(!AUDIO[k])return;AUDIO[k].currentTime=0;AUDIO[k].play().catch(()=>{});}
function setBgVol(v){if(AUDIO.bg)AUDIO.bg.volume=Math.max(0,Math.min(1,v));}

// ═══════════════════════════════════════════════════
//  WS
// ═══════════════════════════════════════════════════
let ws=null,myId=null,isHost=false;
const WS_URL=`${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
function connectWS(){return new Promise((res,rej)=>{ws=new WebSocket(WS_URL);ws.onopen=res;ws.onerror=rej;ws.onmessage=e=>{try{handleMessage(JSON.parse(e.data));}catch(err){console.error(err);}};});}
function send(o){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(o));}

// ═══════════════════════════════════════════════════
//  ЭКРАНЫ
// ═══════════════════════════════════════════════════
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showCreate(){showScreen('screen-create');}
function showJoin(){showScreen('screen-join');}
async function createLobby(){const name=document.getElementById('inp-create-name').value.trim()||'Игрок 1';await connectWS();initAudio();send({type:'create_lobby',name});}
async function joinLobby(){
  const name=document.getElementById('inp-join-name').value.trim()||'Игрок';
  const code=document.getElementById('inp-join-code').value.trim().toUpperCase();
  if(code.length<4){document.getElementById('join-error').textContent='Введи 4-значный код!';return;}
  await connectWS();initAudio();send({type:'join_lobby',name,code});
}
function startGame(){send({type:'start_game'});}
function updateLobbyUI(players){
  const el=document.getElementById('lobby-players');el.innerHTML='';
  players.forEach(p=>{const d=document.createElement('div');d.className='lobby-player';d.innerHTML=`<div class="player-dot" style="background:${p.color}"></div><span style="font-size:1.1rem">${p.name}</span>`;el.appendChild(d);});
}

// ═══════════════════════════════════════════════════
//  ПРОЦЕДУРНЫЕ ТЕКСТУРЫ (Baldi's стиль)
// ═══════════════════════════════════════════════════
function makeTex(w,h,fn){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');fn(ctx,w,h);return c;
}
// Текстура стены — тёмные доски с узором как в Baldi's
const TEX_WALL=makeTex(64,64,(ctx,w,h)=>{
  ctx.fillStyle='#1a2a12';ctx.fillRect(0,0,w,h);
  // Вертикальные доски
  for(let x=0;x<w;x+=8){
    const shade=100+Math.floor(Math.random()*40);
    ctx.fillStyle=`rgb(${Math.floor(shade*.4)},${Math.floor(shade*.6)},${Math.floor(shade*.3)})`;
    ctx.fillRect(x,0,7,h);
  }
  // Горизонтальные линии (стыки)
  ctx.fillStyle='rgba(0,0,0,.5)';
  for(let y=0;y<h;y+=16)ctx.fillRect(0,y,w,1);
  // Шум
  for(let i=0;i<200;i++){
    const px=Math.random()*w,py=Math.random()*h;
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*.3})`;
    ctx.fillRect(px,py,1,1);
  }
});
// Текстура пола — трава/земля
const TEX_FLOOR=makeTex(64,64,(ctx,w,h)=>{
  ctx.fillStyle='#0c1a08';ctx.fillRect(0,0,w,h);
  for(let i=0;i<400;i++){
    const x=Math.random()*w,y=Math.random()*h;
    const g=Math.floor(Math.random()*30+10);
    ctx.fillStyle=`rgb(${Math.floor(g*.4)},${g},${Math.floor(g*.3)})`;
    ctx.fillRect(x,y,Math.random()<.1?2:1,Math.random()<.1?2:1);
  }
  // Травинки
  ctx.strokeStyle='#1a3a0a';ctx.lineWidth=1;
  for(let i=0;i<30;i++){
    const x=Math.random()*w,y=Math.random()*h;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+(Math.random()-.5)*3,y-3-Math.random()*4);ctx.stroke();
  }
});
// Текстура потолка — тёмное небо
const TEX_CEIL=makeTex(64,64,(ctx,w,h)=>{
  ctx.fillStyle='#030a03';ctx.fillRect(0,0,w,h);
  for(let i=0;i<60;i++){
    const x=Math.random()*w,y=Math.random()*h,r=Math.random()*1.2;
    ctx.fillStyle=`rgba(180,220,160,${Math.random()*.6})`;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
});

// Создаём ImageData из canvas-текстур
function texToImageData(texCanvas){
  const ctx=texCanvas.getContext('2d');
  return ctx.getImageData(0,0,texCanvas.width,texCanvas.height);
}
const TWALL=texToImageData(TEX_WALL);
const TFLOOR=texToImageData(TEX_FLOOR);
const TCEIL=texToImageData(TEX_CEIL);

// Спрайты персонажей (billboard) — рисуются как плоские картинки
// Мишкан — тёмный квадратный силуэт с красными глазами
const SPR_MISHKAN=makeTex(64,96,(ctx,w,h)=>{
  // Тело
  ctx.fillStyle='#1c0b00';
  ctx.fillRect(14,20,36,45);
  // Голова
  ctx.fillStyle='#2a1000';
  ctx.fillRect(18,2,28,22);
  // Дырки (спонж-текстура)
  ctx.fillStyle='#080300';
  for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(20+Math.random()*24,6+Math.random()*14,1.5+Math.random()*2,0,Math.PI*2);ctx.fill();}
  // Глаза
  ctx.fillStyle='#ff1100';
  ctx.beginPath();ctx.arc(26,12,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(38,12,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff6600';
  ctx.beginPath();ctx.arc(26,11,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(38,11,2,0,Math.PI*2);ctx.fill();
  // Рты/зубы
  ctx.fillStyle='#ddcc88';
  for(let i=0;i<4;i++){ctx.fillRect(20+i*6,54,4,8);}
  // Руки
  ctx.fillStyle='#1a0900';
  ctx.fillRect(2,25,12,30);
  ctx.fillRect(50,25,12,30);
  // Ноги
  ctx.fillRect(16,64,12,30);
  ctx.fillRect(36,64,12,30);
  // Когти
  ctx.fillStyle='#3a1500';
  for(let i=0;i<3;i++){ctx.fillRect(2+i*4,54,3,7);}
  for(let i=0;i<3;i++){ctx.fillRect(52+i*4,54,3,7);}
});

// Игрок (другой) — простой человечек
function makeSprPlayer(colorHex){
  return makeTex(32,64,(ctx,w,h)=>{
    const r=parseInt(colorHex.slice(1,3),16),g2=parseInt(colorHex.slice(3,5),16),b=parseInt(colorHex.slice(5,7),16);
    // Тело
    ctx.fillStyle=colorHex;ctx.fillRect(8,16,16,22);
    // Голова
    ctx.fillStyle=colorHex;ctx.fillRect(9,2,14,14);
    // Глаза

//  RAYCASTER — движок рендера
// ═══════════════════════════════════════════════════
const RC={
  W:320,H:200, // внутреннее разрешение (как в старых играх)
  FOV:Math.PI/2.2,
  HALF_FOV:0,
  zbuf:null,
  imgData:null,
  ctx:null,
  canvas:null,
};

function initRC(){
  RC.HALF_FOV=RC.FOV/2;
  RC.zbuf=new Float32Array(RC.W);
  const canvas=document.getElementById('gc');
  canvas.width=RC.W;canvas.height=RC.H;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  RC.canvas=canvas;
  RC.ctx=canvas.getContext('2d');
  RC.imgData=RC.ctx.createImageData(RC.W,RC.H);
  window.addEventListener('resize',()=>{
    canvas.style.width=window.innerWidth+'px';
    canvas.style.height=window.innerHeight+'px';
  });
}

// Сэмплируем пиксель из ImageData
function sampleTex(imgd,u,v){
  u=((u%1)+1)%1; v=((v%1)+1)%1;
  const tx=Math.floor(u*imgd.width)&(imgd.width-1);
  const ty=Math.floor(v*imgd.height)&(imgd.height-1);
  const i=(ty*imgd.width+tx)*4;
  return [imgd.data[i],imgd.data[i+1],imgd.data[i+2],imgd.data[i+3]];
}

// Ставим пиксель в imgData
function putPx(x,y,r,g,b){
  if(x<0||x>=RC.W||y<0||y>=RC.H)return;
  const i=(y*RC.W+x)*4;
  RC.imgData.data[i]=r;RC.imgData.data[i+1]=g;RC.imgData.data[i+2]=b;RC.imgData.data[i+3]=255;
}

// Тёмность по расстоянию
function fog(r,g,b,dist){
  const f=Math.max(0,1-dist/18);
  return[Math.floor(r*f),Math.floor(g*f),Math.floor(b*f)];
}

function renderFrame(px,pz,yaw,pitch,map){
  const data=RC.imgData.data;
  const W=RC.W,H=RC.H;
  // Горизонт с учётом pitch (наклон камеры)
  const pitchOffset=Math.floor(pitch*(H/1.4));
  const horizon=Math.floor(H/2)+pitchOffset;

  // Очищаем zbuf
  RC.zbuf.fill(Infinity);

  // ── ПОТОЛОК И ПОЛ (текстурированные) ──
  for(let y=0;y<H;y++){
    const isFloor=y>horizon;
    // Расстояние до плоскости
    const rowDist=isFloor
      ? (0.5*H)/(y-horizon+0.001)
      : (0.5*H)/(horizon-y+0.001);
    if(rowDist<0||rowDist>40)continue;
    // Направление луча
    const floorX=Math.cos(yaw-RC.HALF_FOV);
    const floorZ=Math.sin(yaw-RC.HALF_FOV);
    const floorX2=Math.cos(yaw+RC.HALF_FOV);
    const floorZ2=Math.sin(yaw+RC.HALF_FOV);
    const stepX=(floorX2-floorX)/W;
    const stepZ=(floorZ2-floorZ)/W;
    let curX=px+rowDist*floorX;
    let curZ=pz+rowDist*floorZ;
    const fogF=Math.max(0,1-rowDist/20);
    const td=isFloor?TFLOOR:TCEIL;
    for(let x=0;x<W;x++){
      const [r,g,b]=sampleTex(td,curX/2,curZ/2);
      const fr=Math.floor(r*fogF),fg=Math.floor(g*fogF),fb=Math.floor(b*fogF);
      const i=(y*W+x)*4;
      data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=255;
      curX+=stepX*rowDist;curZ+=stepZ*rowDist;
    }
  }

  // ── СТЕНЫ (raycasting DDA) ──
  for(let col=0;col<W;col++){
    const rayAngle=yaw-RC.HALF_FOV+col*(RC.FOV/W);
    const rdx=Math.cos(rayAngle),rdz=Math.sin(rayAngle);
    let mx=Math.floor(px),mz=Math.floor(pz);
    const deltaDX=Math.abs(1/rdx),deltaDZ=Math.abs(1/rdz);
    let sideDistX,sideDistZ;
    let stepX2,stepZ2;
    if(rdx<0){stepX2=-1;sideDistX=(px-mx)*deltaDX;}else{stepX2=1;sideDistX=(mx+1-px)*deltaDX;}
    if(rdz<0){stepZ2=-1;sideDistZ=(pz-mz)*deltaDZ;}else{stepZ2=1;sideDistZ=(mz+1-pz)*deltaDZ;}
    let hit=false,side=0;
    for(let i=0;i<60&&!hit;i++){
      if(sideDistX<sideDistZ){sideDistX+=deltaDX;mx+=stepX2;side=0;}
      else{sideDistZ+=deltaDZ;mz+=stepZ2;side=1;}
      if(mx<0||mz<0||mx>=40||mz>=40)break;
      if(map[mz]&&map[mz][mx]===1)hit=true;
    }
    if(!hit)continue;
    const perpDist=side===0?(mx-px+(1-stepX2)/2)/rdx:(mz-pz+(1-stepZ2)/2)/rdz;
    if(perpDist<=0)continue;
    RC.zbuf[col]=perpDist;

    // Высота столбца с учётом pitch
    const lineH=Math.floor(H/perpDist);
    const drawStart=Math.max(0,Math.floor((H/2)-lineH/2+pitchOffset));
    const drawEnd=Math.min(H-1,Math.floor((H/2)+lineH/2+pitchOffset));

    // UV текстуры
    let wallX=side===0?(pz+perpDist*rdz):( px+perpDist*rdx);
    wallX-=Math.floor(wallX);
    const fogF=Math.max(0,1-perpDist/16);
    const sideF=side===1?.65:1;

    for(let y=drawStart;y<=drawEnd;y++){
      const texY=(y-(H/2-lineH/2+pitchOffset))/lineH;
      let[r,g,b]=sampleTex(TWALL,wallX,texY);
      r=Math.floor(r*fogF*sideF);g=Math.floor(g*fogF*sideF);b=Math.floor(b*fogF*sideF);
      const i=(y*W+col)*4;
      data[i]=r;data[i+1]=g;data[i+2]=b;data[i+3]=255;
    }
  }
}

// ── РЕНДЕР СПРАЙТА (billboard) ──
function renderSprite(px,pz,yaw,pitch,sx,sz,imgd,sprW,sprH,scaleMul=1){
  const dx=sx-px,dz=sz-pz;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.2||dist>20)return;

  // Угол спрайта относительно камеры
  let sprAngle=Math.atan2(dz,dx)-yaw+Math.PI/2;
  while(sprAngle>Math.PI)sprAngle-=2*Math.PI;
  while(sprAngle<-Math.PI)sprAngle+=2*Math.PI;
  if(Math.abs(sprAngle)>RC.HALF_FOV*1.5)return;

  const W=RC.W,H=RC.H;
  const pitchOffset=Math.floor(pitch*(H/1.4));

  const screenX=Math.floor((sprAngle/RC.FOV+0.5)*W);
  const sprHeight=Math.floor((H/dist)*scaleMul);
  const sprWidth=Math.floor(sprHeight*(sprW/sprH));

  const drawStartY=Math.max(0,Math.floor(H/2-sprHeight/2+pitchOffset));
  const drawEndY=Math.min(H-1,Math.floor(H/2+sprHeight/2+pitchOffset));
  const drawStartX=Math.max(0,screenX-sprWidth/2);
  const drawEndX=Math.min(W-1,screenX+sprWidth/2);

  const fogF=Math.max(0,1-dist/16);

  for(let x=drawStartX;x<=drawEndX;x++){
    if(dist>=RC.zbuf[x])continue; // за стеной
    const tx=(x-(screenX-sprWidth/2))/sprWidth;
    for(let y=drawStartY;y<=drawEndY;y++){
      const ty=(y-drawStartY)/(drawEndY-drawStartY+1);
      const[r,g,b,a]=sampleTex(imgd,tx,ty);
      if(a<128)continue;
      const i=(y*W+x)*4;
      const data=RC.imgData.data;
      data[i]=Math.floor(r*fogF);data[i+1]=Math.floor(g*fogF);data[i+2]=Math.floor(b*fogF);data[i+3]=255;
    }
  }
}

// ── МЕРЦАНИЕ ГЛАЗ МИШКАНА ──
let mishkanGlowT=0;
function renderMishkanGlow(eyeFlash){
  if(!eyeFlash)return;
  const W=RC.W,H=RC.H;
  const data=RC.imgData.data;
  const intensity=Math.floor(eyeFlash*80);
  for(let i=0;i<W*H*4;i+=4){
    data[i]=Math.min(255,data[i]+intensity);
  }
}

// ─── КРЕСТ В ЦЕНТРЕ ───
function drawCrosshair(){
  const cx=Math.floor(RC.W/2),cy=Math.floor(RC.H/2);
  const data=RC.imgData.data;
  for(let dx=-5;dx<=5;dx++){
    if(dx===0)continue;
    const i=(cy*RC.W+(cx+dx))*4;
    if(i>=0&&i<data.length-4){data[i]=200;data[i+1]=200;data[i+2]=200;data[i+3]=180;}
  }
  for(let dy=-5;dy<=5;dy++){
    if(dy===0)continue;
    const i=((cy+dy)*RC.W+cx)*4;
    if(i>=0&&i<data.length-4){data[i]=200;data[i+1]=200;data[i+2]=200;data[i+3]=180;}
  }
}

function handleMessage(msg){
  switch(msg.type){
    case 'lobby_created':
      myId=msg.playerId;isHost=msg.isHost;
      document.getElementById('lobby-code').textContent=msg.code;
      document.getElementById('btn-start').style.display=isHost?'block':'none';
      document.getElementById('lobby-wait-msg').textContent=isHost?'Жди игроков и нажми НАЧАТЬ':'Ожидание хоста...';
      showScreen('screen-lobby');break;
    case 'joined_lobby':
      myId=msg.playerId;isHost=false;
      document.getElementById('lobby-code').textContent=msg.code;
      document.getElementById('btn-start').style.display='none';
      showScreen('screen-lobby');break;
    case 'lobby_update':updateLobbyUI(msg.players);break;
    case 'error':document.getElementById('join-error').textContent=msg.message;break;
    case 'game_start':
      if(gameStarted){console.warn('double game_start ignored');return;}
      gameStarted=true;
      G.map=msg.map;G.items=msg.items;
      msg.players.forEach(p=>{G.players[p.id]={...p,caught:false,hp:100};});
      G.myPlayer=G.players[myId];
      if(!G.myPlayer){console.error('myPlayer null! myId=',myId);return;}
      // Создаём спрайты для игроков
      msg.players.forEach(p=>{if(p.id!==myId)playerSprites[p.id]=sprToImgData(makeSprPlayer(p.color));});
      startGameClient();break;
    case 'game_state':
      G.mishkan=msg.mishkan;
      msg.players.forEach(p=>{
        if(G.players[p.id])Object.assign(G.players[p.id],p);
        if(p.id!==myId&&!playerSprites[p.id])playerSprites[p.id]=sprToImgData(makeSprPlayer(p.color));
      });
      G.items=msg.items;
      updateHUD();
      if(G.players[myId])G.myPlayer=G.players[myId];
      updateMishkanEffects();break;
    case 'player_caught':
      if(msg.playerId===myId){G.caught=true;triggerCaught();}
      else{playAudio('caught');showBobik(`${G.players[msg.playerId]?.name||'Игрок'} пойман Мишканом!`);}
      if(G.players[msg.playerId])G.players[msg.playerId].caught=true;
      updateHUD();break;
    case 'player_healed':
      if(G.players[msg.playerId])G.players[msg.playerId].caught=false;
      if(msg.playerId===myId){G.caught=false;document.getElementById('caught-msg').style.display='none';document.getElementById('overlay-red').classList.remove('active');showBobik('Тебя вылечили! Беги!');}
      updateHUD();break;
    case 'item_collected':
      G.items.forEach(i=>{if(i.id===msg.itemId)i.collected=true;});
      if(msg.itemType==='page'){
        G.pages=G.items.filter(i=>i.type==='page'&&i.collected).length;
        const rem=4-G.pages;
        if(rem===0){G.allPagesCollected=true;showBobik('ВЫ НАШЛИ ВСЕ СТРАНИЦЫ! Бегите к выходу на север!');}
        else showBobik(`Страница найдена! Осталось: ${rem}`);
        updatePagesHUD();
      }
      if(msg.itemType==='energo'&&msg.playerId===myId){
        G.adrenaline=true;G.adrenalineTimer=8000;
        document.getElementById('adrenaline-bar').style.display='block';
        showBobik('НАНОДРЕНАЛИН! Ты летишь как ракета!');
      }
      break;
    case 'game_won':showEndScreen(true);break;
    case 'game_lost':showEndScreen(false);break;
  }
}

function updateMishkanEffects(){
  if(!G.myPlayer||G.caught)return;
  const d=dist2d(G.myPlayer,G.mishkan);
  setBgVol(.05+Math.max(0,1-d/20)*.72);
  const pulse=document.getElementById('overlay-pulse');
  if(d<8){pulse.classList.add('beating');pulse.style.animationDuration=`${Math.max(.28,.8-(8-d)*.065)}s`;}
  else pulse.classList.remove('beating');
  const dx2=G.mishkan.x-G.myPlayer.x,dz2=G.mishkan.z-G.myPlayer.z;
  let diff=Math.atan2(dz2,dx2)-G.camYaw+Math.PI/2;
  while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
  const inView=Math.abs(diff)<RC.HALF_FOV&&d<12;
  if(inView&&!lastInView&&!mishkanZoomTO)triggerMishkanSeen();
  lastInView=inView;
}

let controlsInited=false;
function initControls(){
  if(controlsInited)return;controlsInited=true;
  const canvas=document.getElementById('gc');
  const SENS=0.0035;
  // Камера — свайп по canvas
  let camTouchId=null,camLX=0,camLY=0;
  canvas.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el&&(el.closest('#joystick-zone')||el.closest('.action-btns')))continue;
      if(camTouchId===null){camTouchId=t.identifier;camLX=t.clientX;camLY=t.clientY;}
    }
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==camTouchId)continue;
      const dx=t.clientX-camLX,dy=t.clientY-camLY;
      camLX=t.clientX;camLY=t.clientY;
      G.camYaw+=dx*SENS;
      G.camPitch-=dy*SENS*.6;
      G.camPitch=Math.max(-.5,Math.min(.5,G.camPitch));
    }
  },{passive:true});
  canvas.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===camTouchId)camTouchId=null;},{passive:true});

  // Джойстик
  const jZone=document.getElementById('joystick-zone');
  const knob=document.getElementById('joystick-knob');
  const KR=28;
  let joyTouchId=null;
  function getJoyC(){const r=jZone.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
  jZone.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(joyTouchId===null){joyTouchId=t.identifier;}},{passive:false});
  jZone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==joyTouchId)continue;
      const c=getJoyC();
      let dx=t.clientX-c.x,dy=t.clientY-c.y;
      const len=Math.sqrt(dx*dx+dy*dy);
      const cl=Math.min(len,KR);
      if(len>0){dx=dx/len*cl;dy=dy/len*cl;}
      knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
      G.joyX=dx/KR;G.joyZ=dy/KR;
    }
  },{passive:false});
  function joyRel(e){for(const t of e.changedTouches)if(t.identifier===joyTouchId){joyTouchId=null;G.joyX=0;G.joyZ=0;knob.style.transform='translate(-50%,-50%)';}}
  jZone.addEventListener('touchend',joyRel,{passive:false});
  jZone.addEventListener('touchcancel',joyRel,{passive:false});

  // Кнопки
  document.getElementById('btn-interact').addEventListener('touchstart',e=>{e.preventDefault();G.interact=true;},{passive:false});
  document.getElementById('btn-interact').addEventListener('touchend',e=>{e.preventDefault();G.interact=false;},{passive:false});
  document.getElementById('btn-sprint').addEventListener('touchstart',e=>{e.preventDefault();G.sprinting=true;},{passive:false});
  document.getElementById('btn-sprint').addEventListener('touchend',e=>{e.preventDefault();G.sprinting=false;},{passive:false});

  // Клавиатура
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w')G.keys.up=true;
    if(e.key==='ArrowDown'||e.key==='s')G.keys.down=true;
    if(e.key==='ArrowLeft'||e.key==='a')G.keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d')G.keys.right=true;
    if(e.key==='q'||e.key==='Q')G.camYaw-=0.05;
    if(e.key==='e'||e.key==='E')G.interact=true;
    if(e.key==='Shift')G.sprinting=true;
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp'||e.key==='w')G.keys.up=false;
    if(e.key==='ArrowDown'||e.key==='s')G.keys.down=false;
    if(e.key==='ArrowLeft'||e.key==='a')G.keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d')G.keys.right=false;
    if(e.key==='e'||e.key==='E')G.interact=false;
    if(e.key==='Shift')G.sprinting=false;
  });
}

// ═══════════════════════════════════════════════════
//  ИГРОВОЙ ЦИКЛ
// ═══════════════════════════════════════════════════
let lastSend=0,bobikTimer=30,loopId=null,lastTime=0;

function startGameClient(){
  showScreen('screen-game');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    initRC();
    // Стартовая позиция
    camera_px=G.myPlayer.x+0.5;
    camera_pz=G.myPlayer.z+0.5;
    G.camYaw=0;G.camPitch=0;
    initControls();
    AUDIO.bg?.play().catch(()=>{});
    showBobik('Привет... я Бобик. Мишкан где-то здесь!');
    if(loopId)cancelAnimationFrame(loopId);
    lastTime=performance.now();
    loopId=requestAnimationFrame(loop);
  }));
}

// Позиция камеры (отдельно от G.myPlayer для плавности)
let camera_px=4.5,camera_pz=4.5;

function loop(now){
  loopId=requestAnimationFrame(loop);
  if(!G.myPlayer||!G.map||!RC.ctx)return;

  const dt=Math.min((now-lastTime)/1000,.05);
  lastTime=now;
  const t=now/1000;

  // ── ДВИЖЕНИЕ ──
  if(!G.caught){
    const speedMult=(G.adrenaline?2.1:1)*(G.sprinting&&G.stamina>0?1.6:1);
    const speed=3.2*speedMult*dt;
    const fx=Math.sin(G.camYaw),fz=Math.cos(G.camYaw);
    const rx=Math.cos(G.camYaw),rz=-Math.sin(G.camYaw);
    let mx=0,mz=0;
    // Клавиатура
    if(G.keys.up){mx+=fx;mz+=fz;}
    if(G.keys.down){mx-=fx;mz-=fz;}
    if(G.keys.left)G.camYaw-=2*dt;
    if(G.keys.right)G.camYaw+=2*dt;
    // Джойстик (вперёд/назад + стрейф)
    if(Math.abs(G.joyX)>.08||Math.abs(G.joyZ)>.08){
      mx+=fx*(-G.joyZ)+rx*G.joyX;
      mz+=fz*(-G.joyZ)+rz*G.joyX;
    }
    const moving=mx!==0||mz!==0;
    if(moving){
      const len=Math.sqrt(mx*mx+mz*mz);
      const nx=camera_px+(mx/len)*speed;
      const nz=camera_pz+(mz/len)*speed;
      const cx=Math.floor(camera_px),cz=Math.floor(camera_pz);
      if(G.map[cz]&&G.map[cz][Math.floor(nx)]!==1)camera_px=nx;
      if(G.map[Math.floor(nz)]&&G.map[Math.floor(nz)][cx]!==1)camera_pz=nz;
    }
    // Синхронизируем с сервером
    G.myPlayer.x=camera_px;G.myPlayer.z=camera_pz;

    // Стамина
    if(G.sprinting&&moving)G.stamina=Math.max(0,G.stamina-22*dt);
    else G.stamina=Math.min(100,G.stamina+12*dt);
    document.getElementById('stamina-fill').style.width=G.stamina+'%';
    if(G.adrenaline){
      G.adrenalineTimer-=dt*1000;
      document.getElementById('adrenaline-fill').style.width=Math.max(0,G.adrenalineTimer/80)+'%';
      if(G.adrenalineTimer<=0){G.adrenaline=false;document.getElementById('adrenaline-bar').style.display='none';}
    }

    // Бобинг
    const targetBob=moving?(G.sprinting?.055:.03):0;
    G.bobbingAmt+=(targetBob-G.bobbingAmt)*Math.min(1,10*dt);
    if(moving)G.bobbingT+=dt*(G.sprinting?9:5.5);
    const bobPitch=Math.sin(G.bobbingT)*G.bobbingAmt*.25;
    const bobYaw=Math.sin(G.bobbingT*.5)*G.bobbingAmt*.06;

    // Шаги
    if(moving){G.footstepTimer-=dt;if(G.footstepTimer<=0){playFootstep();G.footstepTimer=G.sprinting?.27:.44;}}
    else G.footstepTimer=0;

    // Предметы рядом
    let nearItem=false,nearItemData=null;
    G.items.forEach(item=>{
      if(!item.collected&&dist2d({x:camera_px,z:camera_pz},item)<1.2){nearItem=true;nearItemData=item;}
    });
    document.getElementById('near-item').style.display=nearItem?'block':'none';
    if(nearItem)document.getElementById('near-item').textContent=nearItemData.type==='page'?'[ E ] Взять страницу':'[ E ] Выпить энергос';

    const distExit=dist2d({x:camera_px,z:camera_pz},{x:20.5,z:1.5});
    document.getElementById('exit-indicator').style.display=(G.allPagesCollected&&distExit<2.5)?'block':'none';

    if(G.interact){
      Object.values(G.players).forEach(p=>{
        if(p.caught&&p.id!==myId&&dist2d({x:camera_px,z:camera_pz},p)<2)send({type:'heal_player',targetId:p.id});
      });
    }

    // Стрелка к выходу
    if(G.allPagesCollected){
      const edx=20.5-camera_px,edz=1.5-camera_pz;
      let diff2=Math.atan2(edx,edz)-G.camYaw;
      while(diff2>Math.PI)diff2-=2*Math.PI;while(diff2<-Math.PI)diff2+=2*Math.PI;
      const arrow=document.getElementById('exit-arrow');
      if(Math.abs(diff2)>.4){arrow.textContent=`ВЫХОД ${diff2>0?'◀':'▶'} ${Math.abs(Math.round(diff2*180/Math.PI))}°`;arrow.style.display='block';}
      else arrow.style.display='none';
    }

    // Лечение
    if(G.interact){
      Object.values(G.players).forEach(p=>{if(p.caught&&p.id!==myId&&dist2d({x:camera_px,z:camera_pz},p)<2)send({type:'heal_player',targetId:p.id});});
    }

    // Подсказка об упавших
    const caughtPl=Object.values(G.players).filter(p=>p.caught&&p.id!==myId);
    if(caughtPl.length>0){
      const near=caughtPl.reduce((a,b)=>dist2d({x:camera_px,z:camera_pz},a)<dist2d({x:camera_px,z:camera_pz},b)?a:b);
      const d=dist2d({x:camera_px,z:camera_pz},near);
      if(d<8)showBobik(`${near.name} пойман! До него ${Math.round(d)} м`);
    }

    // Финальный pitch с боббингом
    var renderPitch=G.camPitch+bobPitch;
    var renderYaw=G.camYaw+bobYaw;
  } else {
    // Пойман
    var renderPitch=G.camPitch-.2+Math.sin(t*.5)*.05;
    var renderYaw=G.camYaw;
    const free=Object.values(G.players).filter(p=>!p.caught&&p.id!==myId);
    if(free.length>0){
      const near=free.reduce((a,b)=>dist2d({x:camera_px,z:camera_pz},a)<dist2d({x:camera_px,z:camera_pz},b)?a:b);
      document.getElementById('distance-to-heal').textContent=`До спасения: ${Math.round(dist2d({x:camera_px,z:camera_pz},near))} м — ${near.name}`;
    }
  }

  // ── РЕНДЕР ──
  renderFrame(camera_px,camera_pz,renderYaw,renderPitch,G.map);

  // Мерцание глаз Мишкана вблизи
  const mDist=dist2d({x:camera_px,z:camera_pz},G.mishkan);
  if(mDist<6){
    mishkanGlowT+=dt;
    const glow=(Math.sin(mishkanGlowT*4)+1)/2*Math.max(0,(6-mDist)/6)*.15;
    renderMishkanGlow(glow);
  }

  // Спрайты — собираем список с расстояниями и сортируем
  const sprites=[];
  // Мишкан
  sprites.push({x:G.mishkan.x+.5,z:G.mishkan.z+.5,imgd:IMISHKAN,w:64,h:96,scale:1.4});
  // Предметы
  G.items.forEach(item=>{
    if(item.collected)return;
    if(item.type==='page')sprites.push({x:item.x,z:item.z,imgd:IPAGE,w:32,h:48,scale:.7});
    else sprites.push({x:item.x,z:item.z,imgd:IENERGOS,w:24,h:40,scale:.6});
  });
  // Выход
  sprites.push({x:20.5,z:.9,imgd:IEXIT,w:48,h:80,scale:1.0});
  // Другие игроки
  Object.values(G.players).forEach(p=>{
    if(p.id===myId||!playerSprites[p.id])return;
    sprites.push({x:p.x,z:p.z,imgd:playerSprites[p.id],w:32,h:64,scale:.9});
  });
  // Сортируем по расстоянию (дальние первыми)
  sprites.sort((a,b)=>dist2d({x:camera_px,z:camera_pz},b)-dist2d({x:camera_px,z:camera_pz},a));
  sprites.forEach(s=>renderSprite(camera_px,camera_pz,renderYaw,renderPitch,s.x,s.z,s.imgd,s.w,s.h,s.scale));

  drawCrosshair();
  RC.ctx.putImageData(RC.imgData,0,0);

  // Отправка
  const nowMs=performance.now();
  if(nowMs-lastSend>50){
    lastSend=nowMs;
    send({type:'player_move',x:camera_px,z:camera_pz,angle:G.camYaw,sprint:G.sprinting,interact:G.interact});
    G.interact=false;
  }
  bobikTimer-=dt;
  if(bobikTimer<=0){bobikTimer=28+Math.random()*20;if(Math.random()<.3)showBobik(BM[Math.floor(Math.random()*BM.length)]);}
}

function showEndScreen(won){
  if(AUDIO.bg)AUDIO.bg.pause();
  document.getElementById('end-title').textContent=won?'ВЫ ВЫБРАЛИСЬ!':'МИШКАН ПОБЕДИЛ';
  document.getElementById('end-title').style.color=won?'#4ac84a':'#ff3030';
  document.getElementById('end-msg').textContent=won?'Бобик счастлив. Приходите ещё... только не ночью.':'Мишкан поймал всех. Бобик грустит.';
  showScreen('screen-end');
}
</script>
