<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Лес Мишкана</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'VT323',monospace;color:#c8d8b0;user-select:none;}
.screen{display:none;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#screen-game.active{display:block!important;}
#screen-title{background:radial-gradient(ellipse at center,#0d1f0d 0%,#000 70%);}
#screen-title h1{font-family:'Creepster',cursive;font-size:clamp(2.5rem,8vw,5rem);color:#ff3030;text-shadow:0 0 20px #ff000088;letter-spacing:4px;animation:flicker 3s infinite;text-align:center;padding:0 1rem;}
#screen-title p{font-size:1.2rem;color:#6a8a6a;margin:.5rem 0 2rem;text-align:center;}
@keyframes flicker{0%,95%,100%{opacity:1;}96%{opacity:.4;}97%{opacity:1;}98%{opacity:.2;}}
.btn{background:transparent;border:2px solid #ff3030;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.7rem 2rem;margin:.4rem;cursor:pointer;letter-spacing:2px;transition:all .2s;min-width:200px;text-align:center;}
.btn:hover,.btn:active{background:#ff3030;box-shadow:0 0 20px #ff3030;}
.btn-green{border-color:#4a8a4a;}
.btn-green:hover,.btn-green:active{background:#2d6b2d;}
input.inp{background:#111;border:2px solid #3a5a3a;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.6rem 1rem;margin:.4rem;width:220px;text-align:center;outline:none;letter-spacing:2px;}
input.inp:focus{border-color:#ff3030;}
#screen-lobby{background:radial-gradient(ellipse at center,#0d1a0d 0%,#000 80%);}
#lobby-code{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;letter-spacing:8px;text-shadow:0 0 15px #ff000066;margin:.5rem 0;}
#lobby-players{width:90%;max-width:350px;margin:1rem 0;}
.lobby-player{display:flex;align-items:center;background:#111;border:1px solid #2a3a2a;padding:.5rem 1rem;margin:.3rem 0;border-radius:4px;}
.player-dot{width:14px;height:14px;border-radius:50%;margin-right:.7rem;flex-shrink:0;}
#game-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;touch-action:none;z-index:2;}
#hud{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:10;}
/* TOP RIGHT */
#top-right{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
#hud-players{display:flex;flex-direction:column;gap:3px;}
.hud-player{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.78);border:1px solid #2a3a2a;border-radius:14px;padding:3px 7px;}
.hud-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-family:'Creepster',cursive;color:#000;font-weight:bold;flex-shrink:0;position:relative;}
.hud-avatar.caught::after{content:'✕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);border-radius:50%;color:#ff3030;font-size:.95rem;}
.hud-hp-bar{width:40px;height:5px;background:#333;border-radius:3px;overflow:hidden;}
.hud-hp-fill{height:100%;background:#4a8a4a;border-radius:3px;}
.hud-name{font-size:.7rem;color:#999;}
/* MINIMAP */
#minimap-wrap{background:rgba(0,0,0,.82);border:2px solid #2a4a2a;border-radius:5px;padding:3px;margin-top:3px;}
#minimap-canvas{display:block;border-radius:3px;}
#minimap-label{font-size:.6rem;color:#3a5a3a;text-align:center;letter-spacing:1px;margin-top:1px;}
/* BOTTOM LEFT */
#hud-stamina{position:absolute;bottom:155px;left:14px;display:flex;flex-direction:column;gap:3px;}
.bar-label{font-size:.78rem;color:#777;letter-spacing:1px;}
.bar-track{width:90px;height:7px;background:#1a1a1a;border-radius:4px;overflow:hidden;border:1px solid #2a2a2a;}
.bar-fill{height:100%;border-radius:4px;transition:width .1s;}
#stamina-fill{background:linear-gradient(90deg,#256625,#50ff50);}
#adrenaline-fill{background:linear-gradient(90deg,#996600,#ffcc00);}
/* BOTTOM RIGHT — страницы */
#hud-pages{position:absolute;bottom:155px;right:14px;display:flex;flex-wrap:wrap;gap:2px;max-width:110px;justify-content:flex-end;}
.page-icon{width:17px;height:21px;border:2px solid #3a3a3a;border-radius:2px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#3a3a3a;transition:all .3s;}
.page-icon.collected{border-color:#b89030;background:#1a1200;color:#b89030;}
/* CENTER */
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5);border-radius:2px;}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%);}
#near-item{position:absolute;bottom:205px;left:50%;transform:translateX(-50%);background:rgba(190,155,40,.15);border:1px solid #b89030;border-radius:5px;padding:4px 12px;font-size:.95rem;color:#b89030;display:none;}
#exit-indicator{position:absolute;top:35%;left:50%;transform:translateX(-50%);background:rgba(60,180,60,.12);border:1px solid #40b840;border-radius:5px;padding:4px 12px;font-size:.95rem;color:#40b840;display:none;}
#exit-arrow{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:.95rem;color:#40b840;display:none;background:rgba(0,0,0,.65);padding:2px 10px;border-radius:5px;}
#bobik-msg{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid #2a4a2a;border-radius:7px;padding:6px 13px;max-width:86vw;font-size:.9rem;color:#ffe08a;text-align:center;opacity:0;transition:opacity .5s;white-space:nowrap;}
#bobik-msg.show{opacity:1;}
#bobik-msg::before{content:'🟡 Бобик: ';}
#grace-timer{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-family:'Creepster',cursive;font-size:2.2rem;color:#ff4040;text-shadow:0 0 18px #ff000077;text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;}
#grace-timer.show{opacity:1;}
#caught-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(120,0,0,.92);border:2px solid #ff3030;border-radius:8px;padding:13px 20px;font-family:'Creepster',cursive;font-size:1.35rem;color:#fff;text-align:center;display:none;z-index:20;}
#distance-to-heal{font-size:.9rem;color:#ffaaaa;margin-top:3px;}
/* OVERLAYS */
#overlay-red{position:fixed;inset:0;background:rgba(139,0,0,0);pointer-events:none;transition:background .3s;z-index:14;}
#overlay-red.active{background:rgba(139,0,0,.48);}
#overlay-pulse{position:fixed;inset:0;pointer-events:none;z-index:14;}
#overlay-pulse.beating{animation:heartbeat .6s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{box-shadow:inset 0 0 0 rgba(255,0,0,0);}50%{box-shadow:inset 0 0 55px rgba(255,0,0,.36);}}
#overlay-screamer{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:100;}
#overlay-screamer.show{display:flex;animation:screamShake .5s;}
#overlay-screamer img{width:100%;height:100%;object-fit:cover;filter:saturate(.3) contrast(1.5);}
@keyframes screamShake{0%,100%{transform:translate(0,0);}10%{transform:translate(-8px,6px) rotate(-2deg);}20%{transform:translate(8px,-6px) rotate(2deg);}50%{transform:translate(4px,-2px);}80%{transform:translate(-2px,1px);}}
/* CONTROLS */
#controls{position:fixed;bottom:10px;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 14px;z-index:20;}
#joystick-zone{width:128px;height:128px;position:relative;flex-shrink:0;touch-action:none;}
#joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.17);}
#joystick-knob{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.27);border:2px solid rgba(255,255,255,.42);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.action-btns{display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.action-btn{background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.22);border-radius:50%;width:62px;height:62px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;cursor:pointer;-webkit-tap-highlight-color:transparent;color:#c8d8b0;font-family:'VT323',monospace;touch-action:none;}
.action-btn:active{background:rgba(255,255,255,.2);}
#btn-interact{border-color:#b89030;}
#btn-sprint{border-color:#3a7a3a;}
#screen-end{background:radial-gradient(ellipse at center,#1a0000 0%,#000 70%);z-index:200;}
#screen-end h1{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;text-align:center;margin-bottom:1rem;}
#screen-end p{color:#888;font-size:1.2rem;text-align:center;margin-bottom:1.5rem;}
</style>
</head>
<body>

<div id="screen-title" class="screen active">
  <h1>ЛЕС<br>МИШКАНА</h1>
  <p>horror · multiplayer · forest</p>
  <button class="btn" onclick="showCreate()">СОЗДАТЬ ЛОББИ</button>
  <button class="btn btn-green" onclick="showJoin()">ВОЙТИ В ЛОББИ</button>
</div>
<div id="screen-create" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030;margin-bottom:1rem">СОЗДАТЬ ЛОББИ</h2>
  <input class="inp" id="inp-create-name" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
  <button class="btn" onclick="createLobby()">СОЗДАТЬ</button>
  <button class="btn btn-green" onclick="showScreen('screen-title')" style="margin-top:.5rem">НАЗАД</button>
</div>
<div id="screen-join" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030;margin-bottom:1rem">ВОЙТИ В ЛОББИ</h2>
  <input class="inp" id="inp-join-name" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
  <input class="inp" id="inp-join-code" placeholder="КОД ЛОББИ" maxlength="4" style="text-transform:uppercase;letter-spacing:6px">
  <button class="btn" onclick="joinLobby()">ВОЙТИ</button>
  <button class="btn btn-green" onclick="showScreen('screen-title')" style="margin-top:.5rem">НАЗАД</button>
  <p id="join-error" style="color:#ff3030;font-size:1rem;margin-top:.5rem"></p>
</div>
<div id="screen-lobby" class="screen">
  <h2 style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030">ЛОББИ</h2>
  <p style="color:#555;font-size:1rem;margin-bottom:.3rem">Код для друзей:</p>
  <div id="lobby-code">----</div>
  <p style="color:#555;font-size:.9rem;margin-bottom:1rem">Поделись кодом в чате</p>
  <div id="lobby-players"></div>
  <button class="btn" id="btn-start" onclick="startGame()" style="display:none;margin-top:1rem">НАЧАТЬ ИГРУ</button>
  <p style="color:#445544;font-size:.9rem;margin-top:.5rem" id="lobby-wait-msg">Ожидание хоста...</p>
</div>

<div id="screen-game" class="screen">
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <div id="top-right">
      <div id="hud-players"></div>
      <div id="minimap-wrap">
        <canvas id="minimap-canvas" width="110" height="110"></canvas>
        <div id="minimap-label">КАРТА ЛЕСА</div>
      </div>
    </div>
    <div id="hud-stamina">
      <span class="bar-label">СТАМИНА</span>
      <div class="bar-track"><div class="bar-fill" id="stamina-fill" style="width:100%"></div></div>
      <div id="adrenaline-bar" style="display:none">
        <span class="bar-label">НАНОДРЕНАЛИН</span>
        <div class="bar-track"><div class="bar-fill" id="adrenaline-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div id="hud-pages"></div>
    <div id="crosshair"></div>
    <div id="near-item">[ E ] Взять</div>
    <div id="exit-indicator">🚪 ВЫХОД — нажми E</div>
    <div id="exit-arrow"></div>
    <div id="bobik-msg"></div>
    <div id="grace-timer"></div>
    <div id="caught-msg">😵 ТЫ ПОЙМАН!<br><div id="distance-to-heal">Жди помощи...</div></div>
  </div>
  <div id="overlay-red"></div>
  <div id="overlay-pulse"></div>
  <div id="overlay-screamer">
    <img src="https://image2url.com/r2/default/files/1775503421307-9e71057d-b620-4800-9c13-8e055aeefc40.jpg" alt="">
  </div>
  <div id="controls">
    <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-knob"></div></div>
    <div class="action-btns">
      <button class="action-btn" id="btn-interact">E</button>
      <button class="action-btn" id="btn-sprint">⚡</button>
    </div>
  </div>
</div>

<div id="screen-end" class="screen">
  <h1 id="end-title">ИГРА ОКОНЧЕНА</h1>
  <p id="end-msg"></p>
  <button class="btn" onclick="location.reload()">В ГЛАВНОЕ МЕНЮ</button>
</div>

function playFootstep(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*.05),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/600)*.3;
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  g.gain.value=.25; src.buffer=buf; src.connect(g); g.connect(audioCtx.destination); src.start();
}
function playAudio(k){if(!AUDIO[k])return;AUDIO[k].currentTime=0;AUDIO[k].play().catch(()=>{});}
function setBgVol(v){if(AUDIO.bg)AUDIO.bg.volume=Math.max(0,Math.min(1,v));}

const G={
  items:[],players:{},
  mishkan:{x:MISHKAN_START.x,z:MISHKAN_START.z,angle:0},
  myPlayer:null,caught:false,
  stamina:100,sprinting:false,

// ══════════════════════════════════════════
//  RAYCASTER ENGINE (DDA + Z-buffer)
// ══════════════════════════════════════════
let rcCanvas=null,rcCtx=null,rcW=0,rcH=0;
let FOV=Math.PI/2.5; // ~72° как в Baldi's

function initRC(){
  rcCanvas=document.getElementById('game-canvas');
  rcCtx=rcCanvas.getContext('2d');
  onResize();
  window.addEventListener('resize',onResize);
}
function onResize(){
  rcW=window.innerWidth; rcH=window.innerHeight;
  rcCanvas.width=rcW; rcCanvas.height=rcH;
}

// Цвет стены с затемнением по расстоянию
function getWallColor(side,dist){
  const f=Math.max(0,1-dist/18);
  if(side===1) return `rgb(${Math.floor(12*f)},${Math.floor(38*f)},${Math.floor(12*f)})`;
  return `rgb(${Math.floor(18*f)},${Math.floor(55*f)},${Math.floor(18*f)})`;
}

function renderScene(){
  if(!G.myPlayer) return;
  const ctx=rcCtx, W=rcW, H=rcH;
  const px=G.myPlayer.x, pz=G.myPlayer.z;
  const yaw=G.camYaw, pitch=G.camPitch;
  const horizon=Math.floor(H/2+pitch*H*0.45);

  // Небо
  ctx.fillStyle='#030903';
  ctx.fillRect(0,0,W,Math.max(0,horizon));
  // Пол
  ctx.fillStyle='#070d07';
  ctx.fillRect(0,horizon,W,H-horizon);

  // Лёгкий градиент пола
  const floorGrad=ctx.createLinearGradient(0,horizon,0,H);
  floorGrad.addColorStop(0,'rgba(15,30,10,0.5)');
  floorGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0,horizon,W,H-horizon);

  const halfFOV=FOV/2;
  const zBuf=new Float32Array(W);

  // ── СТЕНЫ (DDA) ──
  for(let col=0;col<W;col++){
    const rayAngle=yaw-halfFOV+(col/W)*FOV;
    const rdx=Math.sin(rayAngle), rdz=Math.cos(rayAngle);

    let mx=Math.floor(px), mz=Math.floor(pz);
    const sx=rdx>0?1:-1, sz=rdz>0?1:-1;
    const ddx=Math.abs(1/rdx), ddz=Math.abs(1/rdz);
    let sdx=(rdx>0?(mx+1-px):(px-mx))*ddx;
    let sdz=(rdz>0?(mz+1-pz):(pz-mz))*ddz;
    let side=0, hit=false;

    for(let step=0;step<64;step++){
      if(sdx<sdz){sdx+=ddx;mx+=sx;side=0;}
      else{sdz+=ddz;mz+=sz;side=1;}
      if(mz<0||mz>=32||mx<0||mx>=32){break;}
      if(MAP[mz][mx]===1){hit=true;break;}
    }

    let dist=0;
    if(hit){
      dist=side===0?(sdx-ddx):(sdz-ddz);
      dist=Math.max(0.001,dist*Math.cos(rayAngle-yaw)); // fisheye fix
    } else dist=18;
    zBuf[col]=dist;

    const wallH=Math.min(H*3,Math.floor(H/dist));
    const wTop=Math.floor(horizon-wallH/2);
    const wBot=wTop+wallH;
    ctx.fillStyle=getWallColor(side,dist);
    ctx.fillRect(col,wTop,1,wBot-wTop);

    // Полоска текстуры (мох/кора)
    if(dist<10&&wallH>4){
      const tx=Math.floor(Date.now()/5000+col*0.03+mz*1.7+mx*2.3)%3;
      if(tx===0){
        ctx.fillStyle=`rgba(0,${Math.floor(20*(1-dist/10))},0,0.25)`;
        ctx.fillRect(col,wTop+Math.floor(wallH*.15),1,Math.floor(wallH*.7));
      }
    }
  }

  // ── СПРАЙТЫ ──
  const sprites=[];
  G.items.forEach(item=>{
    if(!item.collected) sprites.push({x:item.x,z:item.z,type:item.type,data:item});
  });
  Object.values(G.players).forEach(p=>{
    if(p.id!==myId) sprites.push({x:p.x,z:p.z,type:'player',data:p});
  });
  sprites.push({x:G.mishkan.x,z:G.mishkan.z,type:'mishkan',data:G.mishkan});

  // Сортировка дальние→ближние
  sprites.forEach(s=>{
    const dx=s.x-px,dz=s.z-pz;
    s._dist2=dx*dx+dz*dz;
  });
  sprites.sort((a,b)=>b._dist2-a._dist2);

  sprites.forEach(sp=>{
    const dx=sp.x-px, dz=sp.z-pz;
    const dist=Math.sqrt(sp._dist2);
    if(dist<0.25||dist>16) return;

    let relAngle=Math.atan2(dx,dz)-yaw;
    while(relAngle>Math.PI)relAngle-=Math.PI*2;
    while(relAngle<-Math.PI)relAngle+=Math.PI*2;
    if(Math.abs(relAngle)>halfFOV*1.1) return;

    const scrX=Math.floor(W/2+(relAngle/halfFOV)*(W/2));
    const scale=sp.type==='mishkan'?1.15:(sp.type==='player'?0.85:0.65);
    const sh=Math.min(H*2.2,Math.floor((H/dist)*scale));
    const sw=Math.floor(sh*(sp.type==='mishkan'?0.85:sp.type==='player'?0.6:0.55));
    const sLeft=scrX-Math.floor(sw/2);
    const sTop=Math.floor(horizon-sh*(sp.type==='mishkan'?0.88:0.82));
    const bright=Math.max(0.07,1-dist/16);

    // Рисуем по колонкам через Z-буфер
    for(let sx2=0;sx2<sw;sx2++){
      const cx=sLeft+sx2;
      if(cx<0||cx>=W) continue;
      if(zBuf[cx]<=dist) continue; // стена ближе — пропускаем ✅
      const u=sx2/sw; // 0..1 горизонтальная позиция
      drawSpriteStrip(ctx,sp.type,sp.data,cx,sTop,sh,u,bright);
    }
  });

  // ── ВОРОТА ВЫХОДА ──
  {
    const dx=EXIT_POS.x-px, dz=EXIT_POS.z-pz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>0.3&&dist<16){
      let rel=Math.atan2(dx,dz)-yaw;
      while(rel>Math.PI)rel-=Math.PI*2; while(rel<-Math.PI)rel+=Math.PI*2;
      if(Math.abs(rel)<halfFOV*1.05){
        const scx=Math.floor(W/2+(rel/halfFOV)*(W/2));
        const sh=Math.min(H*2,Math.floor(H/dist*1.4));
        const sw=Math.floor(sh*0.55);
        const bright=Math.max(0,1-dist/16);
        const alpha=G.allPagesCollected?bright*0.95:bright*0.4;
        ctx.save();
        ctx.globalAlpha=alpha;
        const gc=G.allPagesCollected?`rgb(0,${Math.floor(220*bright)},0)`:`rgb(0,${Math.floor(100*bright)},0)`;
        ctx.fillStyle=gc;
        // Столбы
        ctx.fillRect(scx-Math.floor(sw/2),Math.floor(horizon-sh*.88),3,sh);
        ctx.fillRect(scx+Math.floor(sw/2)-3,Math.floor(horizon-sh*.88),3,sh);
        ctx.fillRect(scx-Math.floor(sw/2),Math.floor(horizon-sh*.88),sw,3);
        if(G.allPagesCollected){
          ctx.fillStyle=`rgba(0,255,50,${alpha*0.12})`;
          ctx.fillRect(scx-Math.floor(sw/2)+3,Math.floor(horizon-sh*.88)+3,sw-6,sh-3);
        }
        ctx.restore();
      }
    }
  }

  // Виньетка
  const vig=rcCtx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,.65)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);
}

// Рисует 1px вертикальную полосу спрайта
function drawSpriteStrip(ctx,type,data,x,top,height,u,bright){
  if(type==='mishkan'){
    // Мишкан: детальная 2.5D текстура спанч боба-монстра
    const t = Date.now();
    const pulse = (Math.sin(t*0.003)+1)*0.5;
    // Зоны по u (горизонталь):
    // 0.00-0.08 левая рука    0.08-0.92 тело    0.92-1.0 правая рука
    // Зоны по height (вертикаль):
    // 0-15% голова-нос  15-30% глаза  30-45% нос/рот  45-90% тело  90-100% ноги
    const isLeftArm  = u < 0.10;
    const isRightArm = u > 0.90;
    const isBody     = !isLeftArm && !isRightArm;
    const relY = (y) => (y - top) / Math.max(1, height);

    if(isLeftArm || isRightArm){
      // Руки — тёмно-жёлтые, длинные
      const armTop  = Math.floor(top + height*0.38);
      const armH    = Math.floor(height*0.42);
      ctx.fillStyle = `rgba(${Math.floor(60*bright)},${Math.floor(45*bright)},0,${bright*0.9})`;
      ctx.fillRect(x, armTop, 1, armH);
      // Кисть
      ctx.fillStyle = `rgba(${Math.floor(50*bright)},${Math.floor(38*bright)},0,${bright})`;
      ctx.fillRect(x, armTop+armH, 1, Math.floor(height*0.08));
      return;
    }

    // === ТЕЛО (isBody) ===
    // Высота всего спрайта делится на зоны
    const hh = height; // полная высота
    const bodyTop  = top;
    const eyeZone  = Math.floor(top + hh*0.18);
    const mouthZ   = Math.floor(top + hh*0.36);
    const beltZ    = Math.floor(top + hh*0.50);
    const shoeZ    = Math.floor(top + hh*0.82);
    const botZ     = Math.floor(top + hh*0.92);

    // -- Голова (жёлтая рваная губка) --
    const spongeNoise = ((Math.floor(u*18+2))%5===0) ? 0.75 : 1.0;
    const headR = Math.floor(180*bright*spongeNoise);
    const headG = Math.floor(155*bright*spongeNoise);
    ctx.fillStyle = `rgba(${headR},${headG},0,${bright})`;
    ctx.fillRect(x, bodyTop, 1, eyeZone - bodyTop);

    // -- Дырки-поры на голове --
    const poreRow = Math.floor(u*12);
    const isPore = (poreRow%4===1) && ((Math.floor(u*20+1))%5===0);
    if(isPore && eyeZone - bodyTop > 4){
      ctx.fillStyle = `rgba(${Math.floor(90*bright)},${Math.floor(70*bright)},0,${bright})`;
      const poreY = Math.floor(bodyTop + (eyeZone-bodyTop)*0.5);
      ctx.fillRect(x, poreY, 1, Math.max(1, Math.floor((eyeZone-bodyTop)*0.3)));
    }

    // -- Глаза (большие красные с зрачком) --
    const isLeftEye  = (u>0.22 && u<0.42);
    const isRightEye = (u>0.58 && u<0.78);
    const eyeH = Math.floor(hh*0.17);
    if(isLeftEye || isRightEye){
      // Белок
      ctx.fillStyle = `rgba(${Math.floor(220*bright)},${Math.floor(180*bright)},${Math.floor(180*bright)},${bright})`;
      ctx.fillRect(x, eyeZone, 1, eyeH);
      // Красный зрачок посередине глаза
      const isCenter = (isLeftEye && u>0.28 && u<0.36)||(isRightEye && u>0.64 && u<0.72);
      if(isCenter){
        const pupilY = Math.floor(eyeZone + eyeH*0.25);
        const pupilH = Math.floor(eyeH*0.5);
        ctx.fillStyle = `rgba(255,${Math.floor(20*bright)},0,${Math.min(1,bright+pulse*0.4)})`;
        ctx.fillRect(x, pupilY, 1, pupilH);
        // Блик
        ctx.fillStyle = `rgba(255,255,255,${bright*0.6})`;
        ctx.fillRect(x, pupilY, 1, Math.max(1,Math.floor(pupilH*0.25)));
      }
      // Тело губки под глазом (до рта)
      ctx.fillStyle = `rgba(${Math.floor(170*bright)},${Math.floor(145*bright)},0,${bright})`;
      ctx.fillRect(x, eyeZone+eyeH, 1, mouthZ-(eyeZone+eyeH));
    } else {
      // Нос между глазами
      ctx.fillStyle = `rgba(${Math.floor(160*bright)},${Math.floor(135*bright)},0,${bright})`;
      ctx.fillRect(x, eyeZone, 1, mouthZ-eyeZone);
      // Нос — маленький выступ
      if(Math.abs(u-0.50)<0.05){
        ctx.fillStyle = `rgba(${Math.floor(140*bright)},${Math.floor(110*bright)},0,${bright})`;
        ctx.fillRect(x, eyeZone+Math.floor(eyeH*0.3), 1, Math.floor(eyeH*0.5));
      }
    }

    // -- Рот (зубы + темнота) --
    const mouthH = Math.floor(hh*0.08);
    const isToothZone = u>0.25 && u<0.75;
    if(isToothZone){
      const toothIdx = Math.floor((u-0.25)/0.1);
      const isTooth  = (toothIdx%2===0);
      ctx.fillStyle = isTooth
        ? `rgba(${Math.floor(220*bright)},${Math.floor(210*bright)},${Math.floor(180*bright)},${bright})`
        : `rgba(${Math.floor(20*bright)},${Math.floor(8*bright)},0,${bright})`;
      ctx.fillRect(x, mouthZ, 1, mouthH);
    } else {
      ctx.fillStyle = `rgba(${Math.floor(25*bright)},${Math.floor(10*bright)},0,${bright})`;
      ctx.fillRect(x, mouthZ, 1, mouthH);
    }

    // -- Тело (квадратная губка, жёлтая) --
    const bodyH = shoeZ - (mouthZ+mouthH);
    const bodyR = Math.floor(175*bright*(((Math.floor(u*14))%3===0)?0.82:1.0));
    const bodyG = Math.floor(148*bright*(((Math.floor(u*14))%3===0)?0.82:1.0));
    ctx.fillStyle = `rgba(${bodyR},${bodyG},0,${bright})`;
    ctx.fillRect(x, mouthZ+mouthH, 1, bodyH);
    // Поры на теле
    const bPore = ((Math.floor(u*16))%4===1);
    if(bPore && bodyH>4){
      ctx.fillStyle = `rgba(${Math.floor(80*bright)},${Math.floor(65*bright)},0,${bright})`;
      const py = mouthZ+mouthH+Math.floor(bodyH*0.4);
      ctx.fillRect(x, py, 1, Math.max(1,Math.floor(bodyH*0.2)));
    }
    // Пояс (полоска)
    if(Math.abs(u-0.5)<0.4){
      ctx.fillStyle = `rgba(${Math.floor(100*bright)},${Math.floor(60*bright)},${Math.floor(10*bright)},${bright*0.8})`;
      ctx.fillRect(x, beltZ, 1, Math.max(2,Math.floor(hh*0.04)));
    }

    // -- Ноги (коричневые штаны) --
    const legH = botZ - shoeZ;
    // Две ноги с зазором
    const isLeftLeg  = u>0.22 && u<0.44;
    const isRightLeg = u>0.56 && u<0.78;
    if(isLeftLeg || isRightLeg){
      ctx.fillStyle = `rgba(${Math.floor(100*bright)},${Math.floor(60*bright)},${Math.floor(10*bright)},${bright})`;
      ctx.fillRect(x, shoeZ, 1, legH);
      // Ботинки
      ctx.fillStyle = `rgba(${Math.floor(30*bright)},${Math.floor(20*bright)},${Math.floor(50*bright)},${bright})`;
      ctx.fillRect(x, botZ, 1, Math.floor(hh*0.08));
    }
  } else if(type==='player'){
    const c=hexRgb(data.color||'#ff6b6b');
    const headH=Math.floor(height*.22);
    const bodyH=Math.floor(height*.33);
    const legH=Math.floor(height*.28);
    const r=data.caught?200:Math.floor(c[0]*bright);
    const g2=data.caught?0:Math.floor(c[1]*bright);
    const b2=data.caught?0:Math.floor(c[2]*bright);
    ctx.fillStyle=`rgba(${r},${g2},${b2},${bright})`;
    ctx.fillRect(x,top,1,headH);
    ctx.fillStyle=`rgba(${Math.floor(r*.7)},${Math.floor(g2*.7)},${Math.floor(b2*.7)},${bright})`;
    ctx.fillRect(x,top+headH,1,bodyH);
    ctx.fillStyle=`rgba(${Math.floor(25*bright)},${Math.floor(25*bright)},${Math.floor(55*bright)},${bright})`;
    ctx.fillRect(x,top+headH+bodyH,1,legH);
  } else if(type==='page'){
    const g=(Math.sin(Date.now()*.003+u*6)+1)*.5;
    ctx.fillStyle=`rgba(${Math.floor((160+g*60)*bright)},${Math.floor((120+g*35)*bright)},${Math.floor(30*bright)},${bright})`;
    ctx.fillRect(x,top,1,Math.floor(height*.72));
    // Полоски текста на странице
    if(u>.15&&u<.85){
      const lineY=Math.floor(height*.72/5);
      for(let li=1;li<5;li++){
        ctx.fillStyle=`rgba(${Math.floor(80*bright)},${Math.floor(60*bright)},${Math.floor(10*bright)},${bright*.7})`;
        ctx.fillRect(x,top+li*lineY,1,1);
      }
    }
  } else if(type==='cross'){
    // Крест — белое свечение
    const glow=(Math.sin(Date.now()*.004+u*4)+1)*.5;
    const isVertBar = (u>0.42 && u<0.58);
    const isHorizBar = true; // горизонтальная перекладина посередине
    const crossTop = Math.floor(top+height*0.08);
    const crossH   = Math.floor(height*0.75);
    const horizY   = Math.floor(top+height*0.28);
    const horizH   = Math.floor(height*0.14);
    if(isVertBar){
      ctx.fillStyle=`rgba(${Math.floor((200+glow*55)*bright)},${Math.floor((200+glow*55)*bright)},255,${bright})`;
      ctx.fillRect(x,crossTop,1,crossH);
    } else if(u>0.22 && u<0.78){
      ctx.fillStyle=`rgba(${Math.floor((200+glow*55)*bright)},${Math.floor((200+glow*55)*bright)},255,${bright*0.85})`;
      ctx.fillRect(x,horizY,1,horizH);
    }
    // Свечение
    if(isVertBar){
      ctx.fillStyle=`rgba(100,100,255,${bright*glow*0.3})`;
      ctx.fillRect(x,crossTop,1,crossH);
    }
  } else if(type==='energo'){
    const g=(Math.sin(Date.now()*.005+u*5)+1)*.5;
    const isStripe=u>.2&&u<.8;
    const isLabel=isStripe&&Math.abs(u-.5)<.18;
    if(isLabel){
      ctx.fillStyle=`rgba(0,${Math.floor((200+g*55)*bright)},${Math.floor(160*bright)},${bright})`;
    } else if(isStripe){
      ctx.fillStyle=`rgba(0,${Math.floor((120+g*40)*bright)},${Math.floor(90*bright)},${bright})`;
    } else {
      ctx.fillStyle=`rgba(0,${Math.floor(70*bright)},${Math.floor(50*bright)},${bright})`;
    }
    ctx.fillRect(x,top,1,Math.floor(height*.68));
  }
}

const _hc={};
function hexRgb(hex){
  if(_hc[hex])return _hc[hex];
  return _hc[hex]=[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}

// ══ MINIMAP ══
let mmCanvas=null,mmCtx=null;
const MM_SIZE=110;
const MM_CELL=MM_SIZE/32;

function initMinimap(){
  mmCanvas=document.getElementById('minimap-canvas');
  mmCtx=mmCanvas.getContext('2d');
}

function renderMinimap(){
  if(!mmCtx||!G.myPlayer) return;
  const ctx=mmCtx,C=MM_CELL;
  ctx.clearRect(0,0,MM_SIZE,MM_SIZE);
  ctx.fillStyle='#060e06';
  ctx.fillRect(0,0,MM_SIZE,MM_SIZE);

  // Карта
  for(let z=0;z<32;z++) for(let x=0;x<32;x++){
    if(MAP[z][x]===1){
      ctx.fillStyle='#183010';
      ctx.fillRect(x*C,z*C,C-0.3,C-0.3);
    }
  }

  // Выход
  ctx.fillStyle='rgba(0,220,60,.7)';
  ctx.fillRect(14*C,0,2*C,C*.6);

  // Страницы
  G.items.forEach(item=>{
    if(item.type!=='page') return;
    const glow=(Math.sin(Date.now()*.004+item.x)+1)*.5;
    ctx.globalAlpha=item.collected?0.3:0.7+glow*.3;
    ctx.fillStyle=item.collected?'#5a4010':'#f0c030';
    const s=item.collected?C*.35:C*.45;
    ctx.fillRect(item.x*C-s/2,item.z*C-s/2,s,s);
    ctx.globalAlpha=1;
  });

  // Кресты — синий
  G.items.forEach(item=>{
    if(item.type!=='cross'||item.collected) return;
    const glow=(Math.sin(Date.now()*.005+item.x)+1)*.5;
    ctx.globalAlpha=0.75+glow*.25;
    ctx.fillStyle=`rgb(80,${Math.floor(80+glow*60)},255)`;
    const s=C*.5;
    // Рисуем крестик
    ctx.fillRect(item.x*C-s/4,item.z*C-s/2,s/2,s);    // вертикаль
    ctx.fillRect(item.x*C-s/2,item.z*C-s/4,s,s/2);    // горизонталь
    ctx.globalAlpha=1;
  });

  // Энергосы
  G.items.forEach(item=>{
    if(item.type!=='energo'||item.collected) return;
    const glow=(Math.sin(Date.now()*.006+item.z)+1)*.5;
    ctx.globalAlpha=0.65+glow*.35;
    ctx.fillStyle=`rgb(0,${Math.floor(180+glow*75)},140)`;
    const s=C*.4;
    ctx.fillRect(item.x*C-s/2,item.z*C-s/2,s,s);
    ctx.globalAlpha=1;
  });

  // Другие игроки
  Object.values(G.players).forEach(p=>{
    if(p.id===myId) return;
    ctx.globalAlpha=0.88;
    ctx.fillStyle=p.caught?'#880000':p.color;
    ctx.beginPath();
    ctx.arc(p.x*C,p.z*C,C*.55,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  // Мой игрок + стрелка направления
  const mx=G.myPlayer.x*C, mz=G.myPlayer.z*C;
  ctx.fillStyle='#fff';
  ctx.globalAlpha=0.95;
  ctx.beginPath();
  ctx.arc(mx,mz,C*.65,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,.75)';
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(mx,mz);
  ctx.lineTo(mx+Math.sin(G.camYaw)*C*2.2,mz+Math.cos(G.camYaw)*C*2.2);
  ctx.stroke();

  // Рамка
  ctx.strokeStyle='#1a3a12';
  ctx.lineWidth=1;
  ctx.strokeRect(0,0,MM_SIZE,MM_SIZE);
}

// ── MESSAGES ──
let gameStarted=false;
function handleMessage(msg){
  switch(msg.type){
    case 'lobby_created':
      myId=msg.playerId; isHost=msg.isHost;
      document.getElementById('lobby-code').textContent=msg.code;
      document.getElementById('btn-start').style.display=isHost?'block':'none';
      document.getElementById('lobby-wait-msg').textContent=isHost?'Жди игроков и нажми НАЧАТЬ':'Ожидание хоста...';
      showScreen('screen-lobby'); break;
    case 'joined_lobby':
      myId=msg.playerId; isHost=false;
      document.getElementById('lobby-code').textContent=msg.code;
      if(msg.players) updateLobbyUI(msg.players);
      showScreen('screen-lobby'); break;
    case 'lobby_update': updateLobbyUI(msg.players); break;
    case 'error': document.getElementById('join-error').textContent=msg.message; break;

    case 'game_start':
      if(gameStarted) return;
      gameStarted=true;
      // Предметы берём с сервера (он знает какие собраны)
      G.items=msg.items;
      msg.players.forEach(p=>{G.players[p.id]={...p,caught:false,hp:100};});
      G.myPlayer=G.players[myId];
      if(!G.myPlayer){console.error('no myPlayer');return;}
      // Позиции спавна по индексу
      const spIdx=msg.players.findIndex(p=>p.id===myId);
      const sp=SPAWN_PTS[Math.max(0,Math.min(3,spIdx))];
      G.myPlayer.x=sp.x; G.myPlayer.z=sp.z;
      G.camYaw=Math.PI; G.camPitch=0;
      G.mishkan.x=MISHKAN_START.x; G.mishkan.z=MISHKAN_START.z;
      startGameClient(); break;

    case 'game_state':
      G.mishkan=msg.mishkan;
      msg.players.forEach(p=>{
        if(!G.players[p.id]) return;
        if(p.id===myId){
          // Своего игрока НЕ телепортируем — только состояние
          G.players[p.id].caught=p.caught;
          G.players[p.id].hp=p.hp;
        } else {
          Object.assign(G.players[p.id],p);
        }
      });
      G.items=msg.items;
      updateHUD();
      if(G.players[myId]) G.myPlayer=G.players[myId];
      updateMishkanFX(); break;

    case 'player_caught':
      if(msg.playerId===myId){G.caught=true;triggerCaught();}
      else{playAudio('caught');showBobik(`${G.players[msg.playerId]?.name||'Игрок'} пойман Мишканом!`);}
      if(G.players[msg.playerId]) G.players[msg.playerId].caught=true;
      updateHUD(); break;

    case 'player_healed':
      if(G.players[msg.playerId]) G.players[msg.playerId].caught=false;
      if(msg.playerId===myId){G.caught=false;document.getElementById('caught-msg').style.display='none';document.getElementById('overlay-red').classList.remove('active');showBobik('Тебя вылечили! Беги!');}
      updateHUD(); break;

    case 'item_collected':
      G.items.forEach(i=>{if(i.id===msg.itemId) i.collected=true;});
      if(msg.itemType==='page'){
        G.pages=G.items.filter(i=>i.type==='page'&&i.collected).length;
        const rem=10-G.pages;
        if(rem===0){G.allPagesCollected=true;showBobik('ВСЕ 10 СТРАНИЦ! Бегите к выходу на севере!');}
        else showBobik(`Страница найдена! Осталось: ${rem}`);
        updatePagesHUD();
      }
      if(msg.itemType==='energo'&&msg.playerId===myId){
        G.adrenaline=true; G.adrenalineTimer=8000;
        document.getElementById('adrenaline-bar').style.display='block';
        showBobik('НАНОДРЕНАЛИН! Летишь как ракета!');
      }
      break;
    case 'game_won': showEndScreen(true); break;
    case 'game_lost': showEndScreen(false); break;
  }
}

// ── HUD ──
function updateHUD(){
  const c=document.getElementById('hud-players');c.innerHTML='';
  Object.values(G.players).forEach(p=>{
    const d=document.createElement('div');d.className='hud-player';
    d.innerHTML=`<div class="hud-avatar ${p.caught?'caught':''}" style="background:${p.color}">${p.name[0]}</div><div><div class="hud-name">${p.name}${p.id===myId?' (ты)':''}</div><div class="hud-hp-bar"><div class="hud-hp-fill" style="width:${p.hp||0}%"></div></div></div>`;
    c.appendChild(d);
  });
}
function updatePagesHUD(){
  const el=document.getElementById('hud-pages');el.innerHTML='';
  const col=G.items.filter(i=>i.type==='page'&&i.collected).length;
  for(let i=0;i<10;i++){
    const d=document.createElement('div');d.className='page-icon'+(i<col?' collected':'');
    d.id=`page-${i}`;d.textContent='📄';el.appendChild(d);
  }
}
function d2(a,b){return Math.sqrt((a.x-b.x)**2+(a.z-b.z)**2);}

// ── EFFECTS ──
let mzTO=null,lastInView=false;
function updateMishkanFX(){
  if(!G.myPlayer||G.caught) return;
  const dist=d2(G.myPlayer,G.mishkan);
  setBgVol(.04+Math.max(0,1-dist/20)*.76);
  const pulse=document.getElementById('overlay-pulse');
  if(dist<8){pulse.classList.add('beating');pulse.style.animationDuration=`${Math.max(.25,.8-(8-dist)*.07)}s`;}
  else pulse.classList.remove('beating');
  const inView=mishkanInFOV();
  if(inView&&!lastInView&&!mzTO) triggerMishkanSeen();
  lastInView=inView;
}
function mishkanInFOV(){
  if(!G.myPlayer) return false;
  const dx=G.mishkan.x-G.myPlayer.x,dz=G.mishkan.z-G.myPlayer.z;
  if(Math.sqrt(dx*dx+dz*dz)>12) return false;
  let diff=Math.atan2(dx,dz)-G.camYaw;
  while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
  return Math.abs(diff)<FOV*.5;
}
function triggerMishkanSeen(){
  mzTO=setTimeout(()=>mzTO=null,3200);
  FOV=Math.PI/1.7; playAudio('zoom');
  setTimeout(()=>{FOV=Math.PI/2.5;},700);
}
function triggerCaught(){
  document.getElementById('overlay-red').classList.add('active');
  document.getElementById('caught-msg').style.display='block';
  const s=document.getElementById('overlay-screamer');s.classList.add('show');playAudio('scream');
  setTimeout(()=>s.classList.remove('show'),1500);
}

// ── BOBIK ──
let bobTO=null;
const BM=['Тихо-тихо... я его чувствую.','Мишкан не злой. Просто одинокий.','На карте видны все страницы!','Энергос поможет убежать!','Держитесь вместе!'];
function showBobik(msg){
  const el=document.getElementById('bobik-msg');el.textContent=msg;el.classList.add('show');
  clearTimeout(bobTO);bobTO=setTimeout(()=>el.classList.remove('show'),4500);
}

// ── CONTROLS ──
let ctrlInited=false;
function initControls(){
  if(ctrlInited) return;
  ctrlInited=true;
  let camId=null,camLX=0,camLY=0;
  const SENS=0.0042;
  document.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el&&el.closest('#controls')) continue;
      if(camId===null){camId=t.identifier;camLX=t.clientX;camLY=t.clientY;}
    }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==camId) continue;
      G.camYaw+=(t.clientX-camLX)*SENS;  // ✅ свайп вправо = поворот вправо
      G.camPitch+=(t.clientY-camLY)*SENS*.5; // ✅ свайп вниз = смотрим вниз
      G.camPitch=Math.max(-.42,Math.min(.42,G.camPitch));
      camLX=t.clientX;camLY=t.clientY;
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===camId)camId=null;},{passive:true});

  const jZ=document.getElementById('joystick-zone'),knob=document.getElementById('joystick-knob'),KR=42;
  let jId=null;
  jZ.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();const t=e.changedTouches[0];jId=t.identifier;updJoy(t);},{passive:false});
  jZ.addEventListener('touchmove',e=>{e.preventDefault();e.stopPropagation();for(const t of e.changedTouches)if(t.identifier===jId)updJoy(t);},{passive:false});
  function updJoy(t){
    const r=jZ.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
    let dx=t.clientX-cx,dy=t.clientY-cy;
    const len=Math.sqrt(dx*dx+dy*dy),cl=Math.min(len,KR);
    if(len>0){dx=dx/len*cl;dy=dy/len*cl;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    G.joyX=dx/KR; G.joyZ=dy/KR;
  }
  function jRel(e){for(const t of e.changedTouches)if(t.identifier===jId){jId=null;G.joyX=0;G.joyZ=0;knob.style.transform='translate(-50%,-50%)';}}
  jZ.addEventListener('touchend',jRel,{passive:false});
  jZ.addEventListener('touchcancel',jRel,{passive:false});

  document.getElementById('btn-interact').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();G.interact=true;},{passive:false});
  document.getElementById('btn-interact').addEventListener('touchend',e=>{e.preventDefault();G.interact=false;},{passive:false});
  document.getElementById('btn-sprint').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();G.sprinting=true;},{passive:false});
  document.getElementById('btn-sprint').addEventListener('touchend',e=>{e.preventDefault();G.sprinting=false;},{passive:false});

  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w')G.keys.up=true;
    if(e.key==='ArrowDown'||e.key==='s')G.keys.down=true;
    if(e.key==='ArrowLeft'||e.key==='a')G.keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d')G.keys.right=true;
    if(e.key==='e'||e.key==='E')G.interact=true;
    if(e.key==='Shift')G.sprinting=true;
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp'||e.key==='w')G.keys.up=false;
    if(e.key==='ArrowDown'||e.key==='s')G.keys.down=false;
    if(e.key==='ArrowLeft'||e.key==='a')G.keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d')G.keys.right=false;
    if(e.key==='e'||e.key==='E')G.interact=false;
    if(e.key==='Shift')G.sprinting=false;
  });
}

// ── GAME LOOP ──
let lastSend=0,bobTimer=30,loopId=null,lastTS=performance.now();

function startGameClient(){
  showScreen('screen-game');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    initRC(); initMinimap(); buildPagesHUD(); initControls();
    AUDIO.bg?.play().catch(()=>{});
    showBobik('Привет... я Бобик. Мишкан в своём логове!');
    startGraceUI();
    if(loopId!==null) cancelAnimationFrame(loopId);
    loopId=requestAnimationFrame(gameLoop);
  }));
}

function buildPagesHUD(){
  const el=document.getElementById('hud-pages');el.innerHTML='';
  for(let i=0;i<10;i++){const d=document.createElement('div');d.className='page-icon';d.id=`page-${i}`;d.textContent='📄';el.appendChild(d);}
}

function startGraceUI(){
  let t=8;
  const el=document.getElementById('grace-timer');
  el.textContent=`⚠️ Мишкан выйдет через ${t}с`;
  el.classList.add('show');
  const iv=setInterval(()=>{
    t--;
    if(t<=0){el.classList.remove('show');clearInterval(iv);}
    else el.textContent=`⚠️ Мишкан выйдет через ${t}с`;
  },1000);
}

function gameLoop(ts){
  loopId=requestAnimationFrame(gameLoop);
  const dt=Math.min((ts-lastTS)/1000,.05);
  lastTS=ts;
  if(!G.myPlayer) return;

  // ── ДВИЖЕНИЕ ──
  if(!G.caught){
    const spd=(G.adrenaline?2.3:1)*(G.sprinting&&G.stamina>0?1.65:1)*3.1*dt;
    const fx=Math.sin(G.camYaw),fz=Math.cos(G.camYaw);
    const rx=Math.cos(G.camYaw),rz=-Math.sin(G.camYaw);
    let mx=0,mz=0;
    if(G.keys.up){mx+=fx;mz+=fz;}
    if(G.keys.down){mx-=fx;mz-=fz;}
    if(G.keys.left) G.camYaw+=2.1*dt;
    if(G.keys.right) G.camYaw-=2.1*dt;
    if(Math.abs(G.joyX)>.06||Math.abs(G.joyZ)>.06){
      mx+=fx*(-G.joyZ)+rx*G.joyX;
      mz+=fz*(-G.joyZ)+rz*G.joyX;
    }
    const moving=mx!==0||mz!==0;
    if(moving){
      const len=Math.sqrt(mx*mx+mz*mz);
      const nx=G.myPlayer.x+(mx/len)*spd, nz=G.myPlayer.z+(mz/len)*spd;
      const cx=Math.floor(G.myPlayer.x), cz=Math.floor(G.myPlayer.z);
      // Коллизия с padding 0.25
      const bx=nx+(mx/len)*.25, bz=nz+(mz/len)*.25;
      if(MAP[cz]&&MAP[cz][Math.floor(bx)]!==1) G.myPlayer.x=nx;
      if(MAP[Math.floor(bz)]&&MAP[Math.floor(bz)][cx]!==1) G.myPlayer.z=nz;
    }
    // Стамина
    if(G.sprinting&&moving) G.stamina=Math.max(0,G.stamina-22*dt);
    else G.stamina=Math.min(100,G.stamina+12*dt);
    document.getElementById('stamina-fill').style.width=G.stamina+'%';
    // Адреналин
    if(G.adrenaline){
      G.adrenalineTimer-=dt*1000;
      document.getElementById('adrenaline-fill').style.width=Math.max(0,G.adrenalineTimer/80)+'%';
      if(G.adrenalineTimer<=0){G.adrenaline=false;document.getElementById('adrenaline-bar').style.display='none';}
    }
    // Бобинг
    const tBob=moving?(G.sprinting?.08:.044):0;
    G.bobbingAmt+=(tBob-G.bobbingAmt)*Math.min(1,10*dt);
    if(moving){G.bobbingT+=dt*(G.sprinting?9:5.5);}
    G.camPitch=Math.sin(G.bobbingT)*G.bobbingAmt*.45;
    // Шаги
    if(moving){G.footstepTimer-=dt;if(G.footstepTimer<=0){playFootstep();G.footstepTimer=G.sprinting?.27:.44;}}
    else G.footstepTimer=0;

    // Предметы рядом
    let nearItem=false,nearData=null;
    G.items.forEach(i=>{if(!i.collected&&d2(G.myPlayer,i)<1.2){nearItem=true;nearData=i;}});
    document.getElementById('near-item').style.display=nearItem?'block':'none';
    if(nearItem) document.getElementById('near-item').textContent=nearData.type==='page'?'[ E ] Взять страницу':'[ E ] Выпить энергос';
    document.getElementById('exit-indicator').style.display=(G.allPagesCollected&&d2(G.myPlayer,EXIT_POS)<2.5)?'block':'none';

    if(G.interact){
      Object.values(G.players).forEach(p=>{if(p.caught&&p.id!==myId&&d2(G.myPlayer,p)<2.5) send({type:'heal_player',targetId:p.id});});
    }

    // Стрелка выхода
    if(G.allPagesCollected){
      const dx=EXIT_POS.x-G.myPlayer.x,dz2=EXIT_POS.z-G.myPlayer.z;
      let diff=Math.atan2(dx,dz2)-G.camYaw;
      while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
      const arrow=document.getElementById('exit-arrow');
      if(Math.abs(diff)>.35){arrow.textContent=`ВЫХОД ${diff>0?'◀':'▶'} ${Math.abs(Math.round(diff*180/Math.PI))}°`;arrow.style.display='block';}
      else arrow.style.display='none';
    }

    // Дистанция до пойманных
    const cp=Object.values(G.players).filter(p=>p.caught&&p.id!==myId);
    if(cp.length>0){
      const near=cp.reduce((a,b)=>d2(G.myPlayer,a)<d2(G.myPlayer,b)?a:b);
      if(d2(G.myPlayer,near)<9) showBobik(`${near.name} пойман! До него ${Math.round(d2(G.myPlayer,near))} м`);
    }
  } else {
    // Пойман — качаем камеру
    G.camPitch=Math.sin(ts*.0008)*.08-.12;
    const free=Object.values(G.players).filter(p=>!p.caught&&p.id!==myId);
    if(free.length>0){
      const near=free.reduce((a,b)=>d2(G.myPlayer,a)<d2(G.myPlayer,b)?a:b);
      document.getElementById('distance-to-heal').textContent=`До спасения: ${Math.round(d2(G.myPlayer,near))} м — ${near.name}`;
    }
  }

  // RENDER
  renderScene();
  renderMinimap();

  // SEND
  const now=performance.now();
  if(now-lastSend>50){
    lastSend=now;
    send({type:'player_move',x:G.myPlayer.x,z:G.myPlayer.z,angle:G.camYaw,sprint:G.sprinting,interact:G.interact});
    G.interact=false;
  }
  bobTimer-=dt;
  if(bobTimer<=0){bobTimer=28+Math.random()*22;if(Math.random()<.3)showBobik(BM[Math.floor(Math.random()*BM.length)]);}
}

function showEndScreen(won){
  if(AUDIO.bg)AUDIO.bg.pause();
  document.getElementById('end-title').textContent=won?'ВЫ ВЫБРАЛИСЬ!':'МИШКАН ПОБЕДИЛ';
  document.getElementById('end-title').style.color=won?'#4ac84a':'#ff3030';
  document.getElementById('end-msg').textContent=won?'Бобик счастлив. Приходите ещё... только не ночью.':'Мишкан поймал всех. Бобик грустит.';
  showScreen('screen-end');
}
