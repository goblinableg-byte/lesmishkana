<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title id="page-title">Лес Мишкана</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'VT323',monospace;color:#c8d8b0;user-select:none;-webkit-user-select:none;}
.screen{display:none;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#screen-game.active{display:block!important;}
#screen-intro{background:#000;z-index:500;}
#intro-l1{font-family:'VT323',monospace;font-size:clamp(1.5rem,5vw,2.5rem);color:#888;letter-spacing:3px;opacity:0;transition:opacity .6s;}
#intro-l2{font-family:'Creepster',cursive;font-size:clamp(3rem,10vw,6rem);color:#ff0000;text-shadow:0 0 30px #ff000099,0 0 60px #ff000055;letter-spacing:6px;opacity:0;margin-top:1rem;transition:opacity .4s;}
#intro-l2.shake{animation:ishake .08s infinite;}
@keyframes ishake{0%{transform:translate(-3px,-2px) rotate(-.5deg);}25%{transform:translate(3px,2px) rotate(.5deg);}50%{transform:translate(-2px,3px);}75%{transform:translate(2px,-3px);}100%{transform:translate(-1px,1px);}}
#screen-title{background:radial-gradient(ellipse at center,#0d1f0d 0%,#000 70%);}
#screen-title h1{font-family:'Creepster',cursive;font-size:clamp(2.5rem,8vw,5rem);color:#ff3030;text-shadow:0 0 20px #ff000088;letter-spacing:4px;animation:flicker 3s infinite;text-align:center;padding:0 1rem;}
#screen-title p{font-size:1.2rem;color:#6a8a6a;margin:.5rem 0 2rem;text-align:center;}
@keyframes flicker{0%,95%,100%{opacity:1;}96%{opacity:.4;}97%{opacity:1;}98%{opacity:.2;}}
.btn{background:transparent;border:2px solid #ff3030;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.7rem 2rem;margin:.4rem;cursor:pointer;letter-spacing:2px;transition:all .2s;min-width:200px;text-align:center;}
.btn:hover,.btn:active{background:#ff3030;}
.btn-g{border-color:#4a8a4a;}.btn-g:active,.btn-g:hover{background:#2d6b2d;}
input.inp{background:#111;border:2px solid #3a5a3a;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.5rem;padding:.6rem 1rem;margin:.4rem;width:220px;text-align:center;outline:none;letter-spacing:2px;}
input.inp:focus{border-color:#ff3030;}
#screen-lobby{background:radial-gradient(ellipse at center,#0d1a0d 0%,#000 80%);}
#lobby-code{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;letter-spacing:8px;margin:.5rem 0;}
#lobby-players{width:90%;max-width:350px;margin:1rem 0;}
.lp{display:flex;align-items:center;background:#111;border:1px solid #2a3a2a;padding:.5rem 1rem;margin:.3rem 0;border-radius:4px;}
.pdot{width:14px;height:14px;border-radius:50%;margin-right:.7rem;flex-shrink:0;}
#game-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;touch-action:none;z-index:2;}
#hud{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:10;}
#top-right{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
#hud-pl{display:flex;flex-direction:column;gap:3px;}
.hp{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.82);border:1px solid #2a3a2a;border-radius:14px;padding:3px 8px;}
.ha{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-family:'Creepster',cursive;color:#000;font-weight:bold;flex-shrink:0;position:relative;}
.ha.caught::after{content:'✕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.82);border-radius:50%;color:#ff3030;font-size:.95rem;}
.hhb{width:40px;height:5px;background:#333;border-radius:3px;overflow:hidden;}
.hhf{height:100%;background:#4a8a4a;border-radius:3px;}
.hn{font-size:.7rem;color:#999;}
#mm-wrap{background:rgba(0,0,0,.88);border:2px solid #2a4a2a;border-radius:5px;padding:3px;margin-top:3px;}
#mm-canvas{display:block;border-radius:3px;}
#mm-lbl{font-size:.58rem;color:#3a5a3a;text-align:center;letter-spacing:1px;margin-top:1px;}
#hud-bl{position:absolute;bottom:210px;left:14px;display:flex;flex-direction:column;gap:4px;}
.bl{font-size:.78rem;color:#777;letter-spacing:1px;}
.bt{width:90px;height:7px;background:#1a1a1a;border-radius:4px;overflow:hidden;border:1px solid #222;}
.bf{height:100%;border-radius:4px;transition:width .1s;}
#sf{background:linear-gradient(90deg,#256625,#50ff50);}
#af{background:linear-gradient(90deg,#996600,#ffcc00);}
#hud-pg{position:absolute;bottom:210px;right:14px;display:flex;flex-wrap:wrap;gap:2px;max-width:115px;justify-content:flex-end;}
.pi{width:17px;height:21px;border:2px solid #3a3a3a;border-radius:2px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#3a3a3a;transition:all .3s;}
.pi.col{border-color:#b89030;background:#1a1200;color:#b89030;}
#ch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;}
#ch::before,#ch::after{content:'';position:absolute;background:rgba(255,255,255,.5);border-radius:2px;}
#ch::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
#ch::after{width:100%;height:2px;top:50%;transform:translateY(-50%);}
#ni{position:absolute;bottom:225px;left:50%;transform:translateX(-50%);background:rgba(190,155,40,.15);border:1px solid #b89030;border-radius:5px;padding:4px 12px;font-size:.95rem;color:#b89030;display:none;}
#xi{position:absolute;top:35%;left:50%;transform:translateX(-50%);background:rgba(60,180,60,.12);border:1px solid #40b840;border-radius:5px;padding:4px 12px;font-size:.95rem;color:#40b840;display:none;}
#xa{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:.95rem;color:#40b840;display:none;background:rgba(0,0,0,.65);padding:2px 10px;border-radius:5px;}
#gi{position:absolute;top:40%;left:50%;transform:translateX(-50%);background:rgba(255,200,0,.12);border:2px solid #ffc800;border-radius:8px;padding:8px 18px;font-size:1.1rem;color:#ffc800;display:none;text-align:center;animation:py 1s ease-in-out infinite;}
@keyframes py{0%,100%{box-shadow:0 0 10px #ffc80066;}50%{box-shadow:0 0 25px #ffc800bb;}}
#bm{position:absolute;bottom:228px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid #2a4a2a;border-radius:7px;padding:6px 13px;max-width:86vw;font-size:.9rem;color:#ffe08a;text-align:center;opacity:0;transition:opacity .5s;white-space:nowrap;}
#bm.show{opacity:1;}
#gt{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Creepster',cursive;font-size:2rem;color:#ff4040;text-shadow:0 0 18px #ff000077;text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;}
#gt.show{opacity:1;}
#et{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Creepster',cursive;font-size:1.8rem;color:#ff3030;text-shadow:0 0 15px #ff000088;display:none;}
#cm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(120,0,0,.92);border:2px solid #ff3030;border-radius:8px;padding:13px 20px;font-family:'Creepster',cursive;font-size:1.35rem;color:#fff;text-align:center;display:none;z-index:20;}
#dh{font-size:.9rem;color:#ffaaaa;margin-top:3px;}
#crh{position:absolute;bottom:228px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:2px;pointer-events:none;}
#crh canvas{display:block;}
#crh span{font-size:.7rem;color:#8888ff;letter-spacing:1px;}
#or{position:fixed;inset:0;background:rgba(139,0,0,0);pointer-events:none;z-index:14;transition:background .2s;}
#ob{position:fixed;inset:0;background:rgba(20,20,220,0);pointer-events:none;z-index:14;transition:background .2s;}
#op{position:fixed;inset:0;pointer-events:none;z-index:14;}
#op.beat{animation:hb .6s ease-in-out infinite;}
@keyframes hb{0%,100%{box-shadow:inset 0 0 0 rgba(255,0,0,0);}50%{box-shadow:inset 0 0 55px rgba(255,0,0,.38);}}
#os{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:100;}
#os.show{display:flex;animation:ss .5s;}
#os img{width:100%;height:100%;object-fit:cover;filter:saturate(.3) contrast(1.5);}
@keyframes ss{0%,100%{transform:translate(0,0);}10%{transform:translate(-8px,6px) rotate(-2deg);}20%{transform:translate(8px,-6px) rotate(2deg);}50%{transform:translate(4px,-2px);}80%{transform:translate(-2px,1px);}}
/* CONTROLS */
#ctrl{position:fixed;bottom:10px;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 14px;z-index:20;pointer-events:none;}
#jz{width:175px;height:175px;position:relative;flex-shrink:0;touch-action:none;pointer-events:all;}
#jb{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.22);}
#jk{position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.abtns{display:flex;flex-direction:column;gap:12px;align-items:flex-end;pointer-events:all;}
.ab{background:rgba(0,0,0,.62);border:3px solid rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:'VT323',monospace;touch-action:none;pointer-events:all;}
.ab:active{background:rgba(255,255,255,.25);}
#bi{width:100px;height:100px;font-size:2.6rem;color:#f0c040;border-color:#b89030;border-width:4px;}
#bc{width:95px;height:95px;font-size:2.4rem;color:#9999ff;border-color:#6666ff;border-width:4px;}
#bs{width:95px;height:95px;font-size:2.2rem;color:#50ff50;border-color:#3a7a3a;border-width:4px;}
#screen-end{background:radial-gradient(ellipse at center,#1a0000 0%,#000 70%);z-index:200;}
#screen-end h1{font-family:'Creepster',cursive;font-size:3rem;color:#ff3030;text-align:center;margin-bottom:1rem;}
#screen-end p{color:#888;font-size:1.2rem;text-align:center;margin-bottom:1.5rem;}
/* Language button */
#lang-btn{position:fixed;top:12px;right:12px;z-index:9999;background:rgba(0,0,0,.75);border:2px solid #3a6a3a;color:#c8d8b0;font-family:'VT323',monospace;font-size:1.2rem;padding:5px 14px;cursor:pointer;letter-spacing:2px;border-radius:4px;transition:all .2s;}
#lang-btn:hover{background:#3a6a3a;}

/* LOCKER MINIGAME */
#locker-mg{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;pointer-events:all;background:rgba(0,0,10,0.92);}
#locker-mg.active{display:flex;}
#locker-bg-blur{position:absolute;inset:0;background:rgba(0,0,10,0.0);}
#locker-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px;width:280px;}
#locker-title{font-family:'Creepster',cursive;font-size:1.6rem;color:#8888ff;text-shadow:0 0 15px #4444ff88;letter-spacing:2px;text-align:center;}
#locker-beat-zone{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;}
#locker-heart-btn{width:90px;height:90px;border-radius:50%;border:4px solid #cc2244;background:radial-gradient(circle at 40% 35%,#ff4466,#880022);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.8rem;transition:transform 0.06s;box-shadow:0 0 20px #ff004488;-webkit-tap-highlight-color:transparent;touch-action:none;}
#locker-heart-btn:active,#locker-heart-btn.pressed{transform:scale(0.82);box-shadow:0 0 40px #ff0066cc;}
#locker-ripple{position:absolute;width:90px;height:90px;border-radius:50%;border:3px solid #ff4466;opacity:0;pointer-events:none;transform:scale(1);}
@keyframes rippleOut{0%{transform:scale(1);opacity:0.7;}100%{transform:scale(2.2);opacity:0;}}
.ripple-anim{animation:rippleOut 0.6s ease-out forwards;}
#locker-bar-wrap{width:240px;position:relative;}
#locker-bar-track{width:100%;height:18px;background:#111;border:2px solid #333;border-radius:9px;overflow:visible;position:relative;}
#locker-bar-fill{height:100%;background:linear-gradient(90deg,#002288,#4466ff);border-radius:7px;transition:width 0.05s;width:50%;}
#locker-beat-marker{position:absolute;top:-6px;width:8px;height:30px;background:#ff4488;border-radius:4px;transform:translateX(-50%);transition:left 0.05s;}
#locker-beat-window{position:absolute;top:-4px;height:26px;background:rgba(100,255,100,0.25);border:2px solid #44ff44;border-radius:4px;pointer-events:none;}
#locker-timer-bar{width:240px;height:8px;background:#1a0008;border-radius:4px;overflow:hidden;border:1px solid #440011;}
#locker-timer-fill{height:100%;background:linear-gradient(90deg,#ff0033,#ff6600);border-radius:4px;transition:width 0.1s;width:100%;}
#locker-feedback{font-family:'VT323',monospace;font-size:1.4rem;color:#44ff44;letter-spacing:2px;min-height:1.6rem;text-align:center;transition:color 0.2s;}
#locker-miss-overlay{position:fixed;inset:0;background:rgba(255,0,0,0);pointer-events:none;z-index:49;transition:background 0.1s;}

/* LOCKER DOOR CUTSCENE */
#locker-cs{position:fixed;inset:0;z-index:80;display:none;background:#000;}
#locker-cs.active{display:block;}
#locker-cs-canvas{width:100%;height:100%;display:block;}
</style>
</head>
<body>

<!-- Language toggle button (always visible) -->
<button id="lang-btn" onclick="toggleLang()">🌐 DE</button>

<div id="screen-intro" class="screen">
  <div id="intro-l1"></div>
  <div id="intro-l2"></div>
</div>

<!-- PHASE 1: Room with TV -->
<div id="screen-room" class="screen" style="background:#111;position:relative;overflow:hidden;">
  <canvas id="room-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;"></canvas>
  <div id="room-ui" style="position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-bottom:24px;gap:12px;">
    <div id="room-wait" style="font-size:1rem;color:#556655;letter-spacing:2px;text-align:center;"></div>
    <button id="room-ready-btn" class="btn" style="background:rgba(0,180,60,.18);border-color:#00c040;color:#00ff60;font-size:1.6rem;min-width:240px;" onclick="pressReady()"></button>
    <div id="room-players" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
  </div>
</div>

<!-- CAR CUTSCENE -->
<div id="screen-car" class="screen" style="background:#000;overflow:hidden;">
  <canvas id="car-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;"></canvas>
  <div id="car-dialog" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);border:2px solid #2a4a2a;border-radius:10px;padding:12px 22px;max-width:85vw;text-align:center;font-size:1.2rem;color:#c8d8b0;letter-spacing:1px;display:none;"></div>
</div>

<!-- PHASE 2: Forest corridor -->
<div id="screen-corridor" class="screen" style="background:#000;overflow:hidden;">
  <canvas id="corr-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;touch-action:none;"></canvas>
  <div id="corr-hud" style="position:absolute;top:16px;left:50%;transform:translateX(-50%);font-family:Creepster,cursive;font-size:1.5rem;color:#4a8a4a;text-shadow:0 0 10px #00ff0055;"></div>
  <div id="corr-players-hud" style="position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:.9rem;color:#556655;"></div>
  <div id="ctrl2" style="position:fixed;bottom:10px;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 14px;z-index:20;pointer-events:none;">
    <div id="jz2" style="width:175px;height:175px;position:relative;flex-shrink:0;touch-action:none;pointer-events:all;"><div style="position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.22);"></div><div id="jk2" style="position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div></div>
    <div style="width:80px;height:80px;"></div>
  </div>
</div>

<!-- BOBIK CUTSCENE -->
<div id="screen-bobik-cs" class="screen" style="background:#000;overflow:hidden;">
  <canvas id="bobik-cs-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;"></canvas>
  <div id="bobik-dialog" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:2px solid #2a4a2a;border-radius:10px;padding:12px 22px;max-width:88vw;text-align:center;font-size:1.15rem;color:#c8d8b0;letter-spacing:1px;display:none;"></div>
</div>

<!-- TUTORIAL -->
<div id="screen-tutorial" class="screen" style="background:#000;flex-direction:column;gap:18px;padding:30px;">
  <h2 id="tut-title" style="font-family:Creepster,cursive;font-size:2.2rem;color:#ff3030;text-align:center;text-shadow:0 0 20px #ff000066;"></h2>
  <div style="max-width:480px;width:100%;background:rgba(255,255,255,.04);border:1px solid #2a4a2a;border-radius:10px;padding:18px 22px;font-size:1.1rem;line-height:1.9;color:#b0c8a0;" id="tut-content"></div>
  <div id="tut-timer" style="font-family:VT323,monospace;font-size:2.5rem;color:#3a6a3a;letter-spacing:4px;">10</div>
</div>

<div id="screen-title" class="screen active">

  <p id="title-sub">horror · multiplayer · forest</p>
  <button class="btn" id="btn-create" onclick="showCreate()"></button>
  <button class="btn btn-g" id="btn-join" onclick="showJoin()"></button>
  <button class="btn" onclick="toggleFS()" style="border-color:#444;color:#666;font-size:1.1rem;margin-top:.5rem" id="btn-fs"></button>
</div>
<div id="screen-create" class="screen">

<div id="screen-join" class="screen">

  <button class="btn btn-g" id="btn-join-back" onclick="showScreen('screen-title')" style="margin-top:.5rem"></button>
  <p id="je" style="color:#ff3030;font-size:1rem;margin-top:.5rem"></p>
</div>
<div id="screen-lobby" class="screen">
  <h2 id="lobby-title" style="font-family:'Creepster',cursive;font-size:2rem;color:#ff3030"></h2>
  <p id="lobby-code-label" style="color:#555;font-size:1rem;margin-bottom:.3rem"></p>

  <p id="lobby-share-label" style="color:#555;font-size:.9rem;margin-bottom:1rem"></p>

</div>
<div id="screen-game" class="screen">
  <canvas id="game-canvas"></canvas>
  <div id="hud">

      <div id="hud-pl"></div>
      <div id="mm-wrap"><canvas id="mm-canvas" width="120" height="120"></canvas><div id="mm-lbl"></div></div>
    </div>
    <div id="hud-bl">
      <span class="bl" id="hud-stamina-lbl"></span><div class="bt"><div class="bf" id="sf" style="width:100%"></div></div>
      <div id="adb" style="display:none"><span class="bl" id="hud-adr-lbl"></span><div class="bt"><div class="bf" id="af" style="width:100%"></div></div></div>
    </div>
    <div id="hud-pg"></div>
    <div id="crh"><canvas id="crc" width="44" height="44"></canvas><span id="crh-lbl"></span></div>

    <div id="ni"></div>
    <div id="xi"></div>
    <div id="xa"></div>
    <div id="gi"></div>
    <div id="et"></div>
    <div id="bm"></div>

  <div id="or"></div><div id="ob"></div><div id="op"></div>
  <div id="os"><img src="https://image2url.com/r2/default/files/1775503421307-9e71057d-b620-4800-9c13-8e055aeefc40.jpg" alt=""></div>
  <div id="ctrl">

function t(key, ...args) {
  const val = T[LANG][key];
  if (typeof val === 'function') return val(...args);
  return val || key;
}

function toggleLang() {
  LANG = LANG === 'ru' ? 'de' : 'ru';
  applyLang();
}

function applyLang() {
  document.getElementById('lang-btn').textContent = t('langBtn');
  document.title = t('pageTitle');
  // Title screen
  const h1 = document.getElementById('title-h1');
  if (h1) h1.innerHTML = t('titleH1').replace('\n','<br>');
  setText('btn-create', t('btnCreate'));
  setText('btn-join', t('btnJoin'));
  setText('btn-fs', t('btnFS'));
  // Create screen
  setText('create-title', t('createTitle'));
  setPlaceholder('ic', t('nicknamePlaceholder'));
  setText('btn-create-go', t('btnCreateGo'));
  setText('btn-create-back', t('btnBack'));
  // Join screen
  setText('join-title', t('joinTitle'));
  setPlaceholder('ij', t('nicknamePlaceholder'));
  setPlaceholder('ik', t('lobbyCodePlaceholder'));
  setText('btn-join-go', t('btnJoinGo'));
  setText('btn-join-back', t('btnBack'));
  // Lobby screen
  setText('lobby-title', t('lobbyTitle'));
  setText('lobby-code-label', t('lobbyCodeLabel'));
  setText('lobby-share-label', t('lobbyShareLabel'));
  setText('bs2', t('btnStartGame'));
  // Lobby wait label
  const lw = document.getElementById('lw');
  if (lw && lw.textContent) lw.textContent = isHost ? t('lobbyWaitPlayers') : t('lobbyWaitHost');
  // HUD
  setText('mm-lbl', t('mmLabel'));
  setText('hud-stamina-lbl', t('hudStamina'));
  setText('hud-adr-lbl', t('hudAdr'));
  setText('crh-lbl', t('crhLabel'));
  // Tutorial
  setText('tut-title', t('tutTitle'));
  const tc = document.getElementById('tut-content');
  if (tc) tc.innerHTML = t('tutContent');
  // Locker minigame
  const lt = document.getElementById('locker-title');
  if (lt) lt.textContent = t('lockerTitle');
  // Room ready button
  const rrb = document.getElementById('room-ready-btn');
  if (rrb && !rrb.disabled) rrb.textContent = t('roomReadyBtn');
  // Corridor HUD
  setText('corr-hud', t('corridorHud'));
  // End screen
  setText('btn-menu', t('btnMenu'));
}

function setText(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}
function setPlaceholder(id, txt) {
  const el = document.getElementById(id);
  if (el) el.placeholder = txt;
}

// Initial apply
applyLang();

const introAU=new Audio('https://image2url.com/r2/default/files/1775896615534-d7ea207c-6099-410d-87fc-b38a0ce841c0.mp3');
function runIntro(cb){
  showScreen('screen-intro');
  const introEl=document.getElementById('screen-intro');
  introEl.style.cssText='background:#000;opacity:1;transition:none;';
  const l1=document.getElementById('intro-l1'),l2=document.getElementById('intro-l2');
  l1.style.opacity='0';l2.style.opacity='0';l2.classList.remove('shake');
  l1.textContent = t('introL1');
  l2.textContent = t('introL2');
  setTimeout(()=>{l1.style.opacity='1';},600);
  setTimeout(()=>{introAU.currentTime=0;introAU.play().catch(()=>{});l2.style.opacity='1';},2600);
  setTimeout(()=>{l2.classList.add('shake');},3200);
  setTimeout(()=>{
    introEl.style.cssText='background:#fff;opacity:1;transition:background 0.05s;';
    setTimeout(()=>{introEl.style.cssText='background:#000;opacity:1;transition:background 0.1s;';l1.style.opacity='0';l2.style.opacity='0';l2.classList.remove('shake');},60);
    setTimeout(()=>{introEl.style.cssText='background:#000;opacity:0;transition:opacity 0.3s;';setTimeout(()=>{if(cb)cb();},350);},300);
  },6800);
}

function mFb(ctx,x,top,h,u,br){const p=(Math.sin(Date.now()*.003)+1)*.5,ie=Math.abs(u-.28)<.08||Math.abs(u-.72)<.08,ia=u<.1||u>.9;if(ie){ctx.fillStyle=`rgba(${Math.floor(26*br)},${Math.floor(10*br)},0,${br})`;ctx.fillRect(x,top,1,Math.floor(h*.2));ctx.fillStyle=`rgba(255,${Math.floor(15*br)},0,${Math.min(1,br+p*.4)})`;ctx.fillRect(x,Math.floor(top+h*.2),1,Math.floor(h*.15));ctx.fillStyle=`rgba(${Math.floor(22*br)},${Math.floor(8*br)},0,${br})`;ctx.fillRect(x,Math.floor(top+h*.35),1,Math.floor(h*.5));}else if(ia){ctx.fillStyle=`rgba(${Math.floor(18*br)},${Math.floor(7*br)},0,${br})`;ctx.fillRect(x,Math.floor(top+h*.3),1,Math.floor(h*.45));}else{ctx.fillStyle=`rgba(${Math.floor(25*br)},${Math.floor(10*br)},0,${br})`;ctx.fillRect(x,top,1,Math.floor(h*.88));}}

    case 'error':document.getElementById('je').textContent=msg.message;break;
    case 'game_start':
      if(gStarted)return;gStarted=true;
      G.map=msg.map;G.MS=msg.map.length;G.items=msg.items;
      msg.players.forEach(p=>{G.players[p.id]={...p,caught:false,hp:100};});
      G.myP=G.players[myId];if(!G.myP){console.error('no myP');return;}
      G.camY=Math.PI;G.camP=0;G.M.x=MS.x;G.M.z=MS.z;
      PRE.allPlayers=Object.values(G.players);
      showPhase1Room();break;
    case 'game_state':
      if(!G.gameReady)break;
      G.M=msg.mishkan;
      msg.players.forEach(p=>{if(!G.players[p.id])return;if(p.id===myId){G.players[p.id].caught=p.caught;G.players[p.id].hp=p.hp;}else Object.assign(G.players[p.id],p);});
      G.items=msg.items;G.allP=msg.allPagesCollected||false;
      uHUD();if(G.players[myId])G.myP=G.players[myId];uMFX();break;
    case 'pages_all_collected':
      G.allP=true;G.exitH=true;
      if(AU.bg&&AU.bg.paused)AU.bg.play().catch(()=>{});
      showBobik(t('allPages'));
      document.getElementById('gi').innerHTML=t('gatherZone').replace('\n','<br>');
      document.getElementById('gi').style.display='block';break;
    case 'escape_start':
      G.escA=true;
      if(msg.map){G.map=msg.map;G.MSH=msg.map.length;G.MSW=msg.map[0]?msg.map[0].length:64;G.MS=Math.max(G.MSH,G.MSW);}
      if(msg.players)msg.players.forEach(p=>{
        if(G.players[p.id]){G.players[p.id].x=p.x;G.players[p.id].z=p.z;}
        if(p.id===myId&&G.myP){G.myP.x=p.x;G.myP.z=p.z;}
      });
      // ИСПРАВЛЕНО: мишкан в конце коридора z=295
      G.M.x=32;G.M.z=295;
      G.inLocker=false;G.lockerMgActive=false;stopLockerMg();
      document.getElementById('gi').style.display='none';
      runEsc();break;
    case 'locker_entered':
      G.inLocker=true;
      // Заглушить ambient, добавить низкочастотный фильтр (имитируем через тихость)
      if(AU.bg){AU.bg.volume=Math.max(0,(AU.bg.volume||0)*0.25);}
      showBobik('🔵 '+t('lockerExit'));
      break;
    case 'locker_exited':
      G.inLocker=false;G.lockerMgActive=false;
      stopLockerMg();
      if(AU.bg&&!G.exitH){bgV(0.04+Math.max(0,1-d2(G.myP,G.M)/22)*.76);}
      break;
    case 'locker_mishkan_dist':
      if(G.inLocker){
        if(msg.dist<2.5&&!G.lockerMgActive){
          G.lockerMgActive=true;
          startLockerMg();
        }else if(msg.dist>=4&&G.lockerMgActive&&!G.lockerMgFailed){
          // Мишкан ушёл — выиграли
          G.lockerMgActive=false;
          lockerMgSuccess();
        }
      }
      break;
    case 'player_caught':
      if(!G.gameReady)break;
      if(msg.playerId===myId){
        G.caught=true;
        if(msg.fromLocker){
          G.inLocker=false;G.lockerMgActive=false;stopLockerMg();
          runLockerFailCutscene();
        } else {
          tCaught();
        }
      }
      else{pAU('caught');showBobik(t('playerCaught',G.players[msg.playerId]?.name||t('defaultPlayer')));}
      if(G.players[msg.playerId])G.players[msg.playerId].caught=true;uHUD();break;
    case 'player_healed':
      if(G.players[msg.playerId])G.players[msg.playerId].caught=false;
      if(msg.playerId===myId){G.caught=false;document.getElementById('cm').style.display='none';document.getElementById('or').style.background='rgba(139,0,0,0)';showBobik(t('playerHealed'));}
      uHUD();break;
    case 'item_collected':
      G.items.forEach(i=>{if(i.id===msg.itemId)i.collected=true;});
      if(msg.itemType==='page'){G.pages=G.items.filter(i=>i.type==='page'&&i.collected).length;const r=10-G.pages;if(r>0)showBobik(t('pagesLeft',r));uPHUD();}
      if(msg.itemType==='energo'&&msg.playerId===myId){G.adr=true;G.adrT=8000;document.getElementById('adb').style.display='block';showBobik(t('adrenaline'));}
      if(msg.itemType==='cross'&&msg.playerId===myId){G.hasCr=true;showBobik(t('crossFound'));}
      break;
    case 'player_ready_ack':
      if(msg.readyIds)msg.readyIds.forEach(id=>{if(id!==myId)markPlayerReady(id);});
      break;
    case 'mishkan_banished':G.mBan=true;G.mBanT=msg.duration;showBobik(t('mishkanBanished'));break;
    case 'game_won':if(G.gameReady)endGame(true);break;
    case 'game_lost':if(G.gameReady)endGame(false);break;
  }
}

function uHUD(){

function uPHUD(){const el=document.getElementById('hud-pg');el.innerHTML='';const col=G.items.filter(i=>i.type==='page'&&i.collected).length;for(let i=0;i<10;i++){const d=document.createElement('div');d.className='pi'+(i<col?' col':'');d.textContent='📄';el.appendChild(d);}}
function d2(a,b){return Math.sqrt((a.x-b.x)**2+(a.z-b.z)**2);}

function uMFX(){
  if(!G.myP||G.caught)return;
  const dist=d2(G.myP,G.M);
  // В шкафчике — ambient очень тихий и "мыльный" (низкая громкость)
  if(G.inLocker){
    if(AU.bg)bgV(0.015+Math.max(0,1-dist/12)*.08); // очень тихо
    const p=document.getElementById('op');
    p.classList.remove('beat');
    return;
  }
  if(!G.M.banished&&!G.escA&&!G.exitH&&AU.bg){if(AU.bg.paused)AU.bg.play().catch(()=>{});bgV(.04+Math.max(0,1-dist/22)*.76);}
  if(G.exitH&&!G.escA&&AU.bg){if(AU.bg.paused)AU.bg.play().catch(()=>{});bgV(0.04);}
  if(G.M.banished&&AU.bg)AU.bg.volume=Math.max(0,(AU.bg.volume||0)-.02);
  const p=document.getElementById('op');
  if(dist<8&&!G.M.banished&&!G.exitH&&!G.escA){p.classList.add('beat');p.style.animationDuration=`${Math.max(.25,.85-(8-dist)*.08)}s`;}else p.classList.remove('beat');
  if(!G.exitH&&!G.escA){const iv=mVis();if(iv&&!lView&&!mzTO)tSeen();lView=iv;}
}
let mzTO=null,lView=false;
function mVis(){if(!G.myP||G.M.banished)return false;const dx=G.M.x-G.myP.x,dz=G.M.z-G.myP.z;if(Math.sqrt(dx*dx+dz*dz)>12)return false;let d=Math.atan2(dx,dz)-G.camY;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return Math.abs(d)<FOV*.5;}
function tSeen(){mzTO=setTimeout(()=>mzTO=null,3000);FOV=Math.PI/1.7;pAU('zoom');setTimeout(()=>{FOV=Math.PI/2.5;},700);}
function tCaught(){
  document.getElementById('or').style.background='rgba(139,0,0,0.5)';
  document.getElementById('cm-title').textContent=t('cmTitle');
  document.getElementById('dh').textContent=t('dhWait');

  const s=document.getElementById('os');s.classList.add('show');pAU('scream');setTimeout(()=>s.classList.remove('show'),1500);
}

// ══ ESCAPE ══
function runEsc(){
  G.dis=true;G.mRise=-1.8;
  const esc=AU.escape;esc.currentTime=0;esc.volume=0.9;
  showBobik(t('mishkanRises'));
  const sy=G.camY;
  const tgt=Math.PI;
  let nd=tgt-sy;while(nd>Math.PI)nd-=Math.PI*2;while(nd<-Math.PI)nd+=Math.PI*2;
  let running=true;
  function cs(){
    if(!running||!AU.escape)return;const ct=AU.escape.currentTime;
    if(ct===0&&AU.escape.paused){
      AU.escape.play().catch(()=>{});
      let fadeT=0;const fadeIv=setInterval(()=>{fadeT+=0.1;bgV(Math.max(0,0.15-fadeT*0.075));if(fadeT>=2){if(AU.bg)AU.bg.pause();clearInterval(fadeIv);}},100);
    }
    const ct2=AU.escape.currentTime;
    if(ct2<4.5){G.mRise=-1.8+(ct2/4.5)*1.8;G.camY=sy+nd*Math.min(1,ct2/4.0);G.camP=-0.1+Math.sin((ct2/4.5)*Math.PI)*.08;G.sX=(Math.random()-.5)*ct2*.8;G.sY=(Math.random()-.5)*ct2*.8;requestAnimationFrame(cs);return;}
    if(ct2<9.0){G.mRise=0;const p=(ct2-4.5)/4.5;G.sX=(Math.random()-.5)*p*12;G.sY=(Math.random()-.5)*p*12;document.getElementById('or').style.background=`rgba(139,0,0,${p*0.35})`;requestAnimationFrame(cs);return;}
    if(ct2<9.5){G.sX=(Math.random()-.5)*10;G.sY=(Math.random()-.5)*10;requestAnimationFrame(cs);return;}
    running=false;G.dis=false;G.mRise=0;G.sX=0;G.sY=0;G.camP=0;G.camY=0;
    showBobik(t('runToExit'));
    showEscT(esc);
    G.monIv=setInterval(()=>{
      const ct3=esc.currentTime;
      if(ct3<25){FOV=Math.PI/2.5;document.getElementById('or').style.background='rgba(139,0,0,0.05)';}
      if(ct3>=25&&!G.escP2){
        G.escP2=true;
        document.getElementById('or').style.background='rgba(139,0,0,0.5)';
        G.sX=10;G.sY=10;setTimeout(()=>{G.sX=0;G.sY=0;},600);
        startFall();send({type:'escape_phase2'});
        showBobik(t('mishkanRunning'));
      }
      if(ct3>=25&&ct3<101){const pk=(ct3-25)/76;if(Math.random()<.08+pk*.15){G.sX=(Math.random()-.5)*pk*8;G.sY=(Math.random()-.5)*pk*8;}document.getElementById('or').style.background=`rgba(139,0,0,${0.15+pk*0.35})`;}
      if(ct3>=101){clearInterval(G.monIv);}
    },80);
  }
  requestAnimationFrame(cs);
}
function showEscT(esc){const el=document.getElementById('et');el.style.display='block';function u(){if(!esc)return;const l=Math.max(0,101-esc.currentTime);el.textContent=`⏰ ${Math.floor(l/60)}:${String(Math.floor(l%60)).padStart(2,'0')}`;if(l>0)requestAnimationFrame(u);else el.style.display='none';}requestAnimationFrame(u);}
function crashSound(){if(!actx)return;const buf=actx.createBuffer(1,Math.floor(actx.sampleRate*.25),actx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*.08))*(i<actx.sampleRate*.02?i/(actx.sampleRate*.02):1)*.9;const s=actx.createBufferSource(),g=actx.createGain();g.gain.value=1.2;s.buffer=buf;s.connect(g);g.connect(actx.destination);s.start();}

function startFall(){
  G.fO=[];
  if(G.fallIv)clearInterval(G.fallIv);

    if(!G.escA||!G.myP||!G.escP2)return;

}

// ══ LOCKER MINIGAME ══
let LMG={active:false,timer:0,maxTimer:12,beatPos:0,beatDir:1,beatSpeed:0.9,windowL:0.38,windowW:0.22,misses:0,maxMisses:3,lastBeatTime:0,heartInterval:null,timerInterval:null,failed:false};

function startLockerMg(){
  if(LMG.active)return;
  LMG.active=true;LMG.failed=false;LMG.misses=0;LMG.beatPos=0.5;LMG.beatDir=1;
  LMG.timer=LMG.maxTimer;

  document.getElementById('locker-title').textContent=t('lockerTitle');
  document.getElementById('locker-mg').classList.add('active');
  document.getElementById('locker-feedback').textContent='';

  // Запустить звук сердцебиения
  if(AU.heartbeat){AU.heartbeat.currentTime=0;AU.heartbeat.play().catch(()=>{});}

  // Таймер мини-игры
  LMG.timerInterval=setInterval(()=>{
    LMG.timer-=0.1;
    const fill=document.getElementById('locker-timer-fill');
    if(fill)fill.style.width=Math.max(0,LMG.timer/LMG.maxTimer*100)+'%';
    if(LMG.timer<=0){
      // время вышло — провал
      lockerMgFail();
    }
  },100);

  // Анимация маркера сердцебиения (двигается туда-сюда)
  LMG.heartInterval=setInterval(()=>{
    if(!LMG.active)return;
    const speed=LMG.beatSpeed+(LMG.misses*0.2);
    LMG.beatPos+=LMG.beatDir*(speed*0.025);
    if(LMG.beatPos>=0.92){LMG.beatPos=0.92;LMG.beatDir=-1;}
    if(LMG.beatPos<=0.08){LMG.beatPos=0.08;LMG.beatDir=1;}
    const marker=document.getElementById('locker-beat-marker');
    const win=document.getElementById('locker-beat-window');
    if(marker)marker.style.left=(LMG.beatPos*100)+'%';
    // Окно зелёной зоны немного смещается случайно
    const wL=0.35+Math.sin(Date.now()*0.001)*0.1;
    if(win){win.style.left=(wL*100)+'%';win.style.width=(LMG.windowW*100)+'%';}
    LMG.windowL=wL;
  },25);
}

function lockerBeat(e){
  if(e)e.preventDefault();
  if(!LMG.active||LMG.failed)return;
  // Проверить попадание маркера в окно
  const inWindow=LMG.beatPos>=LMG.windowL&&LMG.beatPos<=(LMG.windowL+LMG.windowW);
  const fb=document.getElementById('locker-feedback');
  const btn=document.getElementById('locker-heart-btn');
  const ripple=document.getElementById('locker-ripple');

  // Анимация нажатия
  if(btn){btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),120);}
  if(ripple){ripple.classList.remove('ripple-anim');void ripple.offsetWidth;ripple.classList.add('ripple-anim');}

  if(inWindow){
    if(fb){fb.textContent=t('lockerBeatGood');fb.style.color='#44ff44';}
    LMG.lastBeatTime=Date.now();
    LMG.timer=Math.min(LMG.maxTimer,LMG.timer+1.5); // восстановить немного времени
  } else {
    LMG.misses++;
    if(fb){fb.textContent=t('lockerBeatMiss');fb.style.color='#ff3333';}
    // Красная вспышка
    const mo=document.getElementById('locker-miss-overlay');
    if(mo){mo.style.background='rgba(255,0,0,0.25)';setTimeout(()=>mo.style.background='rgba(255,0,0,0)',200);}
    if(LMG.misses>=LMG.maxMisses){lockerMgFail();return;}
  }
}

function lockerMgFail(){
  if(LMG.failed)return;
  LMG.failed=true;
  stopLockerMg();
  G.lockerMgActive=false;
  G.inLocker=false;
  send({type:'locker_minigame_fail'});
  // Показать катсцену провала
  runLockerFailCutscene();
}

function lockerMgSuccess(){
  stopLockerMg();
  G.lockerMgActive=false;
  send({type:'locker_minigame_success'});
  showBobik(t('lockerSurvived'));
  // Плавно скрыть мини-игру
  const mg=document.getElementById('locker-mg');
  if(mg){mg.style.transition='opacity 0.8s';mg.style.opacity='0';setTimeout(()=>{mg.classList.remove('active');mg.style.opacity='1';mg.style.transition='';},800);}
}

function stopLockerMg(){
  LMG.active=false;
  clearInterval(LMG.timerInterval);clearInterval(LMG.heartInterval);
  LMG.timerInterval=null;LMG.heartInterval=null;
  if(AU.heartbeat){AU.heartbeat.pause();AU.heartbeat.currentTime=0;}
  const mg=document.getElementById('locker-mg');
  if(mg){mg.classList.remove('active');mg.style.opacity='1';mg.style.transition='';}
  document.getElementById('locker-miss-overlay').style.background='rgba(255,0,0,0)';
}

// ══ LOCKER FAIL CUTSCENE ══
function runLockerFailCutscene(){
  const cs=document.getElementById('locker-cs');
  const cv=document.getElementById('locker-cs-canvas');
  cs.classList.add('active');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  G.dis=true;

  // Звук открытия двери
  if(AU.lockerDoor){AU.lockerDoor.currentTime=0;AU.lockerDoor.play().catch(()=>{});}

  let phase=0,pt=0;
  let doorAngle=0; // дверь открывается
  let camY=0,camP=0; // камера падает
  let fallSpeed=0,fallY=0;
  let shakeAmt=0;
  let screamerShown=false;

  function draw(){
    pt+=0.016;
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);

    if(phase===0){
      // Дверь шкафа открывается (0–2s)
      doorAngle=Math.min(Math.PI*0.6,(pt/2)*Math.PI*0.6);
      ctx.fillStyle='#050a05';ctx.fillRect(0,0,W,H);
      // Имитируем вид изнутри шкафа — тёмные стенки
      ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,W,H);
      // Щель двери — свет снаружи
      const gapW=Math.min(W*0.7,W*0.7*(doorAngle/(Math.PI*0.6)));
      const g=ctx.createLinearGradient(W/2-gapW/2,0,W/2+gapW/2,0);
      g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.15,'rgba(40,60,20,0.7)');g.addColorStop(0.5,'rgba(60,80,30,0.9)');g.addColorStop(0.85,'rgba(40,60,20,0.7)');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.fillRect(W/2-gapW/2,0,gapW,H);
      // Силуэт Мишкана в проёме при полном открытии
      if(doorAngle>Math.PI*0.45){
        const alpha=Math.min(1,(doorAngle-Math.PI*0.45)/(Math.PI*0.15));
        ctx.save();ctx.globalAlpha=alpha;
        if(mRdy&&mImg.complete){
          const mh=H*0.85,mw=mh*(mImg.naturalWidth/Math.max(1,mImg.naturalHeight));
          ctx.drawImage(mImg,W/2-mw/2,H*0.15,mw,mh);
        }else{ctx.fillStyle='rgba(20,0,0,0.9)';ctx.beginPath();ctx.ellipse(W/2,H*0.3,W*0.12,H*0.22,0,0,Math.PI*2);ctx.fill();}
        ctx.restore();
      }
      if(pt>2){phase=1;pt=0;}
    } else if(phase===1){
      // Камера "падает" на пол (1.5s)
      fallSpeed+=pt*0.8;camP=Math.min(1.5,camP+fallSpeed*0.016);
      shakeAmt=Math.max(0,(1-pt/1.5)*8);
      ctx.save();
      if(shakeAmt>0)ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
      // Лес/комната наклонена вниз
      const horizon=Math.floor(H*0.5+camP*H*0.5);
      ctx.fillStyle='#020602';ctx.fillRect(0,0,W,horizon);
      ctx.fillStyle='#0a140a';ctx.fillRect(0,horizon,W,H-horizon);
      ctx.restore();
      if(pt>1.5){phase=2;pt=0;
        // Мишкан поднимает камеру — скример звук
        if(AU.lockerScream){AU.lockerScream.currentTime=0;AU.lockerScream.play().catch(()=>{});}
      }
    } else if(phase===2){
      // Мишкан крупным планом + скример (1.5s)
      if(!screamerShown){screamerShown=true;}
      const alpha=Math.min(1,pt/0.2);
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      ctx.save();ctx.globalAlpha=alpha;
      const shake=(Math.random()-.5)*(1-pt/1.5)*15;
      ctx.translate(shake,shake*0.5);
      if(mRdy&&mImg.complete){
        const scale=1+pt*0.3;
        const mh=H*scale,mw=mh*(mImg.naturalWidth/Math.max(1,mImg.naturalHeight));
        ctx.drawImage(mImg,W/2-mw/2,-H*0.05,mw,mh);
      }else{
        ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(W/2,H*0.3,W*0.25+pt*30,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
      if(pt>1.5){
        // Катсцена завершена — показать caught UI
        cs.classList.remove('active');
        G.dis=false;
        tCaught();
        return;
      }
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

let ctOk=false;
const GP={ax:[0,0,0,0],btn:[]};
function pGP(){
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  for(const p of pads){
    if(!p)continue;
    GP.ax[0]=p.axes[0]||0;  // left stick X
    GP.ax[1]=p.axes[1]||0;  // left stick Y
    GP.ax[2]=p.axes[2]||0;  // right stick X
    GP.ax[3]=p.axes[3]||0;  // right stick Y
    GP.btn=p.buttons.map(b=>b.pressed);
    // E = кнопка A (btn[0]) или X (btn[2]) — взаимодействие
    if(GP.btn[0]||GP.btn[2])G.interact=true;
    // G = крест — btn[3] Y/Triangle
    if(GP.btn[3])useCross();
    // Sprint = R2 (btn[7]) или L1 (btn[4])
    G.sprint=!!(GP.btn[4]||GP.btn[7]);
  }
}

function iCtrl(){
  if(ctOk)return;ctOk=true;
  const CAM_ZONE=document.getElementById('game-canvas');
  const SENS=0.003;

  // Pointer lock для мыши
  CAM_ZONE.addEventListener('click',()=>{
    if(!G.inLocker&&!G.caught)CAM_ZONE.requestPointerLock&&CAM_ZONE.requestPointerLock();
  });
  CAM_ZONE.addEventListener('mousemove',e=>{
    if(document.pointerLockElement!==CAM_ZONE||G.dis)return;
    G.camY+=e.movementX*SENS;
    G.camP-=e.movementY*SENS*0.5;
    G.camP=Math.max(-.5,Math.min(.5,G.camP));
  });

  // Touch drag (мобильные)
  const camPtrs=new Map();
  CAM_ZONE.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse')return;const el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.closest('#ctrl'))return;CAM_ZONE.setPointerCapture(e.pointerId);camPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});},{passive:true});
  CAM_ZONE.addEventListener('pointermove',e=>{if(e.pointerType==='mouse')return;if(!camPtrs.has(e.pointerId)||G.dis)return;const prev=camPtrs.get(e.pointerId);G.camY+=(e.clientX-prev.x)*0.008;G.camP-=(e.clientY-prev.y)*0.004;G.camP=Math.max(-.5,Math.min(.5,G.camP));camPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});},{passive:true});
  CAM_ZONE.addEventListener('pointerup',e=>{camPtrs.delete(e.pointerId);},{passive:true});
  CAM_ZONE.addEventListener('pointercancel',e=>{camPtrs.delete(e.pointerId);},{passive:true});

  const jz=document.getElementById('jz'),kn=document.getElementById('jk'),KR=55;let jPtr=null;
  jz.addEventListener('pointerdown',e=>{e.preventDefault();jPtr=e.pointerId;jz.setPointerCapture(e.pointerId);uJoy(e);},{passive:false});
  jz.addEventListener('pointermove',e=>{if(e.pointerId!==jPtr)return;e.preventDefault();uJoy(e);},{passive:false});
  function uJoy(e){const r=jz.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=e.clientX-cx,dy=e.clientY-cy;const len=Math.sqrt(dx*dx+dy*dy),cl=Math.min(len,KR);if(len>0){dx=dx/len*cl;dy=dy/len*cl;}kn.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;G.jX=dx/KR;G.jZ=dy/KR;}
  function jR(e){if(e.pointerId===jPtr){jPtr=null;G.jX=0;G.jZ=0;kn.style.transform='translate(-50%,-50%)';}}
  jz.addEventListener('pointerup',jR,{passive:false});jz.addEventListener('pointercancel',jR,{passive:false});

  function pb(id,dn,up){const el=document.getElementById(id);if(!el)return;el.addEventListener('pointerdown',e=>{e.preventDefault();dn();},{passive:false});el.addEventListener('pointerup',e=>{e.preventDefault();if(up)up();},{passive:false});el.addEventListener('pointercancel',e=>{if(up)up();},{passive:false});}
  pb('bi',()=>{G.interact=true;},()=>{G.interact=false;});
  pb('bs',()=>{G.sprint=true;},()=>{G.sprint=false;});
  pb('bc',()=>{useCross();},null);

  // Клавиатура — нижний регистр И верхний
  window.addEventListener('keydown',e=>{
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W')G.keys.u=true;
    if(k==='ArrowDown'||k==='s'||k==='S')G.keys.d=true;
    if(k==='ArrowLeft'||k==='a'||k==='A')G.keys.l=true;
    if(k==='ArrowRight'||k==='d'||k==='D')G.keys.r=true;
    if(k==='e'||k==='E'){G.interact=true;}
    if(k==='Shift')G.sprint=true;
    if(k==='g'||k==='G')useCross();
    if(k==='PageUp')G.camP=Math.min(.5,G.camP+.06);
    if(k==='PageDown')G.camP=Math.max(-.5,G.camP-.06);
    if(k==='Escape'&&document.pointerLockElement)document.exitPointerLock();
  });
  window.addEventListener('keyup',e=>{
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W')G.keys.u=false;
    if(k==='ArrowDown'||k==='s'||k==='S')G.keys.d=false;
    if(k==='ArrowLeft'||k==='a'||k==='A')G.keys.l=false;
    if(k==='ArrowRight'||k==='d'||k==='D')G.keys.r=false;
    if(k==='e'||k==='E')G.interact=false;
    if(k==='Shift')G.sprint=false;
  });
}

function loop(ts){
  lId=requestAnimationFrame(loop);
  const dt=Math.min((ts-lTS)/1000,.05);lTS=ts;
  if(!G.myP||!G.map)return;
  pGP();
  if(G.escP2){FOV=Math.PI*0.61;}else{FOV=Math.PI/2.5;}

  if(!G.caught&&!G.dis&&!G.stun){
    const eB=G.escP2?3.5:1.0;
    const spd=(G.adr?1.3:1.0)*(G.sprint&&G.stamina>0?1.35:1.0)*2.8*dt*eB;
    const fx=Math.sin(G.camY),fz=Math.cos(G.camY),rx=Math.cos(G.camY),rz=-Math.sin(G.camY);
    let mx=0,mz=0;
    // Движение заблокировано в шкафчике
    if(!G.inLocker){
      if(G.keys.u){mx+=fx;mz+=fz;}if(G.keys.d){mx-=fx;mz-=fz;}
      if(G.keys.l)G.camY+=2.2*dt;if(G.keys.r)G.camY-=2.2*dt;
      if(Math.abs(G.jX)>.06||Math.abs(G.jZ)>.06){mx+=fx*(-G.jZ)+rx*G.jX;mz+=fz*(-G.jZ)+rz*G.jX;}
    }
    const gcX=Math.abs(GP.ax[2])>.12?GP.ax[2]:0,gcY=Math.abs(GP.ax[3])>.12?GP.ax[3]:0;
    G.camY-=gcX*2.5*dt;G.camP-=gcY*1.8*dt;G.camP=Math.max(-.5,Math.min(.5,G.camP));
    if(!G.inLocker){
      if(Math.abs(GP.ax[0])>.12||Math.abs(GP.ax[1])>.12){mx+=fx*(-GP.ax[1])+rx*GP.ax[0];mz+=fz*(-GP.ax[1])+rz*GP.ax[0];}
    }
    if(GP.btn[0])G.interact=true;if(GP.btn[4])G.sprint=true;if(GP.btn[2])useCross();
    const mov=mx!==0||mz!==0;
    if(mov){const len=Math.sqrt(mx*mx+mz*mz);const nx=G.myP.x+(mx/len)*spd,nz=G.myP.z+(mz/len)*spd;const bp=0.2;if(G.map[Math.floor(G.myP.z)]&&G.map[Math.floor(G.myP.z)][Math.floor(nx+(mx/len)*bp)]!==1)G.myP.x=nx;if(G.map[Math.floor(nz+(mz/len)*bp)]&&G.map[Math.floor(nz+(mz/len)*bp)][Math.floor(G.myP.x)]!==1)G.myP.z=nz;}
    if(!G.escP2){if(G.sprint&&mov)G.stamina=Math.max(0,G.stamina-22*dt);else G.stamina=Math.min(100,G.stamina+12*dt);}else G.stamina=100;
    document.getElementById('sf').style.width=G.stamina+'%';
    if(G.adr){G.adrT-=dt*1000;document.getElementById('af').style.width=Math.max(0,G.adrT/80)+'%';if(G.adrT<=0){G.adr=false;document.getElementById('adb').style.display='none';}}
    const tb=mov?(G.sprint||G.escP2?.09:.045):0;G.bAmt+=(tb-G.bAmt)*Math.min(1,10*dt);if(mov)G.bT+=dt*(G.sprint||G.escP2?9:5.5);
    if(mov){G.sT-=dt;if(G.sT<=0){step();G.sT=G.sprint||G.escP2?.26:.44;}}else G.sT=0;
    if(!G.escA)G.camP+=(Math.sin(G.bT)*G.bAmt*.25-G.camP*.01)*dt*4;
    let ni=false,nd=null;G.items.forEach(i=>{
      const dist=d2(G.myP,i);
      if(i.type==='locker'){if(dist<1.4&&!G.inLocker){ni=true;nd=i;}}
      else if(!i.collected&&dist<1.3){ni=true;nd=i;}
    });
    if(G.inLocker){ni=true;nd={type:'locker_exit'};}
    const niEl=document.getElementById('ni');
    niEl.style.display=(ni&&!G.lockerMgActive)?'block':'none';
    if(ni&&nd){
      if(nd.type==='locker')niEl.textContent=t('lockerHide');
      else if(nd.type==='locker_exit')niEl.textContent=t('lockerExit');
      else if(nd.type==='page')niEl.textContent=t('niTakePage');
      else if(nd.type==='energo')niEl.textContent=t('niTakeEnergy');
      else niEl.textContent=t('niTakeCross');
    }
    const ep=G.escA?EXIT_N:{x:32,z:0.7};
    document.getElementById('xi').style.display=(G.allP&&!G.exitH&&d2(G.myP,ep)<2.5)||(G.escA&&d2(G.myP,ep)<2.5)?'block':'none';
    document.getElementById('xi').textContent=t('xiExit');
    if(G.interact&&!G.inLocker)Object.values(G.players).forEach(p=>{if(p.caught&&p.id!==myId&&d2(G.myP,p)<2.5)send({type:'heal_player',targetId:p.id});});
    const tgt=G.exitH&&!G.escA?GATHER:ep;const ex=tgt.x-G.myP.x,ez=tgt.z-G.myP.z;let df=Math.atan2(ex,ez)-G.camY;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
    const arr=document.getElementById('xa');
    if((G.exitH||G.allP)&&Math.abs(df)>.35){arr.textContent=`${G.escA?t('exitDir'):t('gatherDir')} ${df>0?'◀':'▶'} ${Math.abs(Math.round(df*180/Math.PI))}°`;arr.style.display='block';}else arr.style.display='none';
    // Визуальный эффект нахождения в шкафчике — тёмная виньетка по краям и синеватый оттенок
    const lockerOverlay=document.getElementById('ob');
    if(G.inLocker){lockerOverlay.style.background='rgba(0,20,80,0.35)';}
    else if(!G.escA){lockerOverlay.style.background='rgba(20,20,220,0)';}
  }else if(G.stun){G.stunT-=dt;if(G.stunT<=0)G.stun=false;}
  else if(G.caught){
    G.camP=Math.sin(ts*.0008)*.08-.12;
    const fr=Object.values(G.players).filter(p=>!p.caught&&p.id!==myId);
    if(fr.length>0){const nr=fr.reduce((a,b)=>d2(G.myP,a)<d2(G.myP,b)?a:b);document.getElementById('dh').textContent=t('dhDistance',Math.round(d2(G.myP,nr)),nr.name);}
  }

  if(G.escP2)G.fO=G.fO.filter(o=>{o.y-=dt*(o.vy||1.8);if(o.y<=0){if(!o.crashed){o.crashed=true;crashSound();}if(G.myP&&d2(G.myP,o)<1.0&&!G.stun){G.stun=true;G.stunT=1.5;G.sX=8;G.sY=8;setTimeout(()=>{G.sX=0;G.sY=0;},400);showBobik(t('stoneStun'));}return false;}return true;});
  G.sX*=.82;G.sY*=.82;if(Math.abs(G.sX)<.1)G.sX=0;if(Math.abs(G.sY)<.1)G.sY=0;
  if(G.mBan){G.mBanT-=dt;if(G.mBanT<=0){G.mBan=false;if(!G.exitH)showBobik(t('mishkanBack'));}}

  render();rMM();
  const now=performance.now();
  if(now-lSend>50){lSend=now;send({type:'player_move',x:G.myP.x,z:G.myP.z,angle:G.camY,sprint:G.sprint||G.escP2,interact:G.interact});G.interact=false;}
  bobT-=dt;if(bobT<=0){bobT=28+Math.random()*22;if(Math.random()<.3)showBobik(t('bobikTips')[Math.floor(Math.random()*t('bobikTips').length)]);}}

// ─── PHASE 1: ROOM ───
const ROOM_MAP=(()=>{
  const R=12,C=10,m=[];
  for(let z=0;z<C;z++)m.push(new Array(R).fill(0));
  for(let i=0;i<R;i++){m[0][i]=1;m[C-1][i]=1;}
  for(let i=0;i<C;i++){m[i][0]=1;m[i][R-1]=1;}
  m[C-3][2]=1;m[C-3][3]=1;m[C-3][4]=1;
  m[1][4]=1;m[1][5]=1;m[1][6]=1;m[1][7]=1;
  return m;
})();

const RP={x:6,z:7,camY:0,camP:0};
const RK={u:false,d:false,l:false,r:false};
let RJX=0,RJZ=0,roomLId=null,roomCtrlOk=false;

function showPhase1Room(){
  showScreen('screen-room');
  document.getElementById('room-ready-btn').textContent = t('roomReadyBtn');
  const rc=document.getElementById('room-canvas');
  rc.width=window.innerWidth;rc.height=window.innerHeight;
  updateRoomReady();
  setupRoomControls(rc);
  if(roomLId)cancelAnimationFrame(roomLId);
  let lastT=performance.now();
  function roomLoop(ts){
    roomLId=requestAnimationFrame(roomLoop);
    const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
    if(window._roomGamepadPoll)window._roomGamepadPoll();
    const spd=3.0*dt;
    const fx=Math.sin(RP.camY),fz=Math.cos(RP.camY);
    const rx=Math.cos(RP.camY),rz=-Math.sin(RP.camY);
    let mx=0,mz=0;
    if(RK.u){mx+=fx;mz+=fz;}if(RK.d){mx-=fx;mz-=fz;}
    if(RK.l)RP.camY+=2.2*dt;if(RK.r)RP.camY-=2.2*dt;
    if(Math.abs(RJX)>.06||Math.abs(RJZ)>.06){mx+=fx*(-RJZ)+rx*RJX;mz+=fz*(-RJZ)+rz*RJX;}
    if(mx||mz){
      const len=Math.sqrt(mx*mx+mz*mz),bp=0.25;
      const nx=RP.x+(mx/len)*spd,nz=RP.z+(mz/len)*spd;
      if(ROOM_MAP[Math.floor(RP.z)]&&ROOM_MAP[Math.floor(RP.z)][Math.floor(nx+(mx/len)*bp)]!==1)RP.x=nx;
      if(ROOM_MAP[Math.floor(nz+(mz/len)*bp)]&&ROOM_MAP[Math.floor(nz+(mz/len)*bp)][Math.floor(RP.x)]!==1)RP.z=nz;
    }
    renderRoom(rc);
  }
  requestAnimationFrame(roomLoop);
}

function renderRoom(rc){
  const ctx=rc.getContext('2d');
  const W=rc.width,H=rc.height;
  const px=RP.x,pz=RP.z,yaw=RP.camY,pitch=RP.camP;
  const horizon=Math.floor(H/2+pitch*H*0.5);
  const map=ROOM_MAP,SZ=map.length,SX=map[0].length;
  ctx.fillStyle='#1c1208';ctx.fillRect(0,0,W,Math.max(0,horizon));
  const fg=ctx.createLinearGradient(0,horizon,0,H);
  fg.addColorStop(0,'#2a1a08');fg.addColorStop(1,'#140c04');
  ctx.fillStyle=fg;ctx.fillRect(0,Math.max(0,horizon),W,H);
  const fov=Math.PI/2.5,hf=fov/2;
  const zB=new Float32Array(W);
  const tvX1=4,tvX2=7;
  for(let col=0;col<W;col++){
    const ra=yaw-hf+(col/W)*fov;
    const rdx=Math.sin(ra),rdz=Math.cos(ra);
    let mx=Math.floor(px),mz=Math.floor(pz);
    const sx=rdx>0?1:-1,sz=rdz>0?1:-1;
    const ddx=Math.abs(1/rdx),ddz=Math.abs(1/rdz);
    let sdx=(rdx>0?(mx+1-px):(px-mx))*ddx,sdz=(rdz>0?(mz+1-pz):(pz-mz))*ddz;
    let side=0,hit=false,hx=0,hz=0;
    for(let i=0;i<80;i++){
      if(sdx<sdz){sdx+=ddx;mx+=sx;side=0;}else{sdz+=ddz;mz+=sz;side=1;}
      if(mz<0||mz>=SZ||mx<0||mx>=SX)break;
      if(map[mz][mx]===1){hit=true;hx=mx;hz=mz;break;}
    }
    const dist=hit?Math.max(0.001,(side===0?(sdx-ddx):(sdz-ddz))*Math.cos(ra-yaw)):30;
    zB[col]=dist;
    let u;
    if(side===0){u=(pz+dist*Math.cos(ra))%1;if(u<0)u+=1;}
    else{u=(px+dist*Math.sin(ra))%1;if(u<0)u+=1;}
    const isTVWall=(hz===1&&hx>=tvX1&&hx<=tvX2);
    const f=Math.max(0,1-dist/14);
    let r,g,b;
    if(isTVWall){
      const scanline=Math.floor(u*20)%2===0;
      const tvBr=scanline?f*0.9:f*0.7;
      const vu=u;
      if(vu>0.05&&vu<0.95){r=Math.floor(20*tvBr);g=Math.floor(60*tvBr);b=Math.floor(160*tvBr);}
      else{r=Math.floor(30*f);g=Math.floor(20*f);b=Math.floor(10*f);}
    }else if(side===1){r=Math.floor(52*f);g=Math.floor(32*f);b=Math.floor(12*f);}
    else{r=Math.floor(66*f);g=Math.floor(44*f);b=Math.floor(18*f);}
    const wh=Math.min(H*4,Math.floor(H/dist)),wt=Math.floor(horizon-wh/2);
    ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(col,wt,1,Math.max(1,wh));
  }
  // TV overlay
  const tvCX=5.5,tvCZ=1.3;
  const tvDX=tvCX-px,tvDZ=tvCZ-pz;
  const tvDist=Math.sqrt(tvDX*tvDX+tvDZ*tvDZ);
  if(tvDist<8){
    let tvAngle=Math.atan2(tvDX,tvDZ)-yaw;
    while(tvAngle>Math.PI)tvAngle-=Math.PI*2;while(tvAngle<-Math.PI)tvAngle+=Math.PI*2;
    if(Math.abs(tvAngle)<hf*0.8){
      const scrX=Math.floor(W/2+(tvAngle/hf)*(W/2));
      const tvScreenH=Math.min(H*2.5,Math.floor(H/tvDist*1.4));
      const tvScreenW=Math.floor(tvScreenH*1.5);
      const tx2=scrX-tvScreenW/2,ty=horizon-tvScreenH*0.85;
      ctx.save();ctx.globalAlpha=Math.max(0,1-tvDist/7)*0.92;
      ctx.fillStyle='#08152a';ctx.fillRect(tx2,ty,tvScreenW,tvScreenH);
      ctx.fillStyle='#bb1100';ctx.fillRect(tx2,ty+tvScreenH*0.74,tvScreenW,tvScreenH*0.14);
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(tvScreenH*0.08)}px Arial`;ctx.textAlign='center';
      ctx.fillText(t('tvBanner'),scrX,ty+tvScreenH*0.83);
      ctx.fillStyle='#c8e4ff';ctx.font=`bold ${Math.floor(tvScreenH*0.09)}px Arial`;
      ctx.fillText(t('tvLine1'),scrX,ty+tvScreenH*0.2);
      ctx.fillText(t('tvLine2'),scrX,ty+tvScreenH*0.32);
      ctx.fillStyle='#aaccee';ctx.font=`${Math.floor(tvScreenH*0.075)}px Arial`;
      ctx.fillText(t('tvLine3'),scrX,ty+tvScreenH*0.44);
      ctx.fillStyle='#ff3030';ctx.font=`bold ${Math.floor(tvScreenH*0.075)}px Arial`;
      ctx.fillText(t('tvReward'),scrX,ty+tvScreenH*0.60);
      ctx.restore();
    }
  }
  const vg=ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  if(tvDist<5){
    const gl=ctx.createRadialGradient(W/2,horizon,0,W/2,horizon,W*0.4);
    gl.addColorStop(0,`rgba(20,60,160,${0.12*(1-tvDist/5)})`);gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl;ctx.fillRect(0,0,W,H);
  }
  // Другие игроки в комнате (спрайты)
  if(PRE.allPlayers){
    const others=PRE.allPlayers.filter(p=>p.id!==myId);
    // Распределяем их по комнате (статичные позиции у стены)
    others.forEach((p,i)=>{
      const ox=3+i*1.8,oz=7.5;
      const dx=ox-px,dz=oz-pz,dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<0.3||dist>20)return;
      let rel=Math.atan2(dx,dz)-yaw;while(rel>Math.PI)rel-=Math.PI*2;while(rel<-Math.PI)rel+=Math.PI*2;
      if(Math.abs(rel)>hf*1.1)return;
      const scrX=Math.floor(W/2+(rel/hf)*(W/2));
      const sh=Math.min(H*3,Math.floor(H/dist*0.8));
      const sw=Math.floor(sh*0.5);
      const br=Math.max(0.1,1-dist/15);
      const c=hRGB(p.color||'#ff6b6b');
      for(let sx2=0;sx2<sw;sx2++){
        const cx=scrX-Math.floor(sw/2)+sx2;
        if(cx<0||cx>=W||zB[cx]<=dist)continue;
        const hh=Math.floor(sh*.22),bh=Math.floor(sh*.33),lh=Math.floor(sh*.28);
        const sTop=Math.floor(horizon-sh);
        ctx.fillStyle=`rgba(${Math.floor(c[0]*br)},${Math.floor(c[1]*br)},${Math.floor(c[2]*br)},${br})`;
        ctx.fillRect(cx,sTop,1,hh);
        ctx.fillStyle=`rgba(${Math.floor(c[0]*.6*br)},${Math.floor(c[1]*.6*br)},${Math.floor(c[2]*.6*br)},${br})`;
        ctx.fillRect(cx,sTop+hh,1,bh);
        ctx.fillStyle=`rgba(${Math.floor(20*br)},${Math.floor(20*br)},${Math.floor(50*br)},${br})`;
        ctx.fillRect(cx,sTop+hh+bh,1,lh);
      }
    });
  }
}

  const schedule = [

    {at:13.5, text: t('carD2', pName(2)), shake:true},

    setTimeout(()=>{shakeX=0;shakeY=0;},500);
  },13200);

    tp += 0.016;treeScroll += 0.016;
    const W=cv.width,H=cv.height;

    const sky=ctx.createLinearGradient(0,0,0,H*0.45);sky.addColorStop(0,'#02020a');sky.addColorStop(1,'#040815');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.45);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<60;i++){const sx=(i*137.5)%W,sy=(i*53.3)%H*0.38;const blink=Math.sin(tp*2+i)*0.4+0.6;ctx.globalAlpha=blink*0.6;ctx.fillRect(sx,sy,1.2,1.2);}
    ctx.globalAlpha=1;
    const roadW=W*0.55,roadLeft=(W-roadW)/2;
    const roadGrad=ctx.createLinearGradient(0,H*0.45,0,H);roadGrad.addColorStop(0,'#1a1a1a');roadGrad.addColorStop(1,'#0d0d0d');ctx.fillStyle=roadGrad;
    ctx.beginPath();ctx.moveTo(W/2-20,H*0.45);ctx.lineTo(W/2+20,H*0.45);ctx.lineTo(roadLeft+roadW,H);ctx.lineTo(roadLeft,H);ctx.fill();
    ctx.strokeStyle='rgba(255,255,100,0.6)';ctx.lineWidth=3;ctx.setLineDash([30,25]);ctx.lineDashOffset=-treeScroll*200;
    ctx.beginPath();ctx.moveTo(W/2,H*0.47);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    for(let i=0;i<treeOffsets.length;i++){
      const tr=treeOffsets[i];const progress=((tr.x+treeScroll*tr.spd)%1.0);const depth=progress;
      if(depth<0.02)continue;
      const py=H*0.45+depth*(H*0.55);const treeH=depth*H*0.7;const treeW2=treeH*0.22;
      const margin=W*0.04+depth*W*0.18;const px2=tr.lane<0?margin+Math.sin(i*1.7)*margin*0.3:W-margin-Math.sin(i*1.7)*margin*0.3;
      const bright=Math.floor(10+depth*35);
      ctx.fillStyle=`rgb(${bright*0.6},${bright*0.4},${bright*0.2})`;ctx.fillRect(px2-treeW2*0.18,py-treeH*0.3,treeW2*0.36,treeH*0.32);
      for(let l=0;l<3;l++){const lh=treeH*(0.45-l*0.1);const lw=treeW2*(1.2-l*0.25);const ly=py-treeH*(0.3+l*0.22);ctx.fillStyle=`rgb(${bright*0.25},${bright*0.7+l*8},${bright*0.25})`;ctx.beginPath();ctx.moveTo(px2,ly-lh);ctx.lineTo(px2+lw,ly);ctx.lineTo(px2-lw,ly);ctx.fill();}
    }
    ctx.fillStyle='#06100a';ctx.fillRect(0,H*0.85,W,H*0.15);
    const hl=ctx.createRadialGradient(W/2,H*0.98,0,W/2,H*0.98,W*0.35);hl.addColorStop(0,'rgba(220,220,180,0.18)');hl.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=hl;ctx.fillRect(0,H*0.5,W,H*0.5);
    const vg=ctx.createRadialGradient(W/2,H*0.5,H*0.2,W/2,H*0.5,H*0.85);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.75)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    ctx.restore();
    if(schIdx<schedule.length && tp>=schedule[schIdx].at){
      const sc=schedule[schIdx];dlEl.style.display='block';dlEl.style.color=sc.color||'#c8d8b0';dlEl.textContent=sc.text;schIdx++;clearTimeout(dlTO);dlTO=setTimeout(()=>{dlEl.style.display='none';},4800);
    }
    if(tp>=25){running=false;PAU.ambient.pause();dlEl.style.display='none';let fAlpha=0;function fadeOut(){fAlpha+=0.04;ctx.fillStyle=`rgba(0,0,0,${fAlpha})`;ctx.fillRect(0,0,cv.width,cv.height);if(fAlpha<1)requestAnimationFrame(fadeOut);else runPhase2Corridor();}requestAnimationFrame(fadeOut);return;}
    requestAnimationFrame(draw);
  }

function buildCorrMap(){
  const W=20,H=80,map=[];
  for(let z=0;z<H;z++)map.push(new Array(W).fill(1));
  const cx=Math.floor(W/2);
  for(let z=0;z<H;z++)for(let x=cx-4;x<=cx+4;x++)map[z][x]=0;
  for(let x=cx-4;x<=cx+4;x++){map[H-1][x]=0;map[H-2][x]=0;}
  for(let x=cx-4;x<=cx+4;x++){map[0][x]=0;map[1][x]=0;}
  return map;
}

function startCorridorPhase(){
  PRE.corrMap = buildCorrMap();
  PRE.corrP = {x:10, z:75, camY:0, camP:0};
  PRE.corrArrived = false;PRE.corrAllArrived = false;
  PRE.corrArrivedSet = new Set(); // кто уже пришёл
  const cv=document.getElementById('corr-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  setupCorridorControls();
  if(PRE.corrLId)cancelAnimationFrame(PRE.corrLId);
  let lastT=performance.now();

  // Отрисовка других игроков в коридоре (симулируем их движение)
  PRE.otherCorrPlayers = PRE.allPlayers
    .filter(p=>p.id!==myId)
    .map((p,i)=>({id:p.id,name:p.name,color:p.color,x:10+i*1.5,z:75-i*2,arrived:false}));

  function corrLoop(ts){
    PRE.corrLId=requestAnimationFrame(corrLoop);
    const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;

    // Геймпад в коридоре
    const pads=navigator.getGamepads?navigator.getGamepads():[];
    for(const pad of pads){
      if(!pad)continue;
      const ax0=Math.abs(pad.axes[0])>.12?pad.axes[0]:0;
      const ax1=Math.abs(pad.axes[1])>.12?pad.axes[1]:0;
      if(ax0||ax1){
        const fx=Math.sin(PRE.corrP.camY),fz=Math.cos(PRE.corrP.camY);
        const rx=Math.cos(PRE.corrP.camY),rz=-Math.sin(PRE.corrP.camY);
        PRE.corrJX=ax0;PRE.corrJZ=ax1;
      }
      if(Math.abs(pad.axes[2])>.12)PRE.corrP.camY-=pad.axes[2]*2.5*dt;
    }

    if(!PRE.corrArrived){
      const spd=3.5*dt;const fx=Math.sin(PRE.corrP.camY),fz=Math.cos(PRE.corrP.camY);const rx=Math.cos(PRE.corrP.camY),rz=-Math.sin(PRE.corrP.camY);
      let mx=0,mz=0;
      if(PRE.corrKeys.u){mx+=fx;mz+=fz;}if(PRE.corrKeys.d){mx-=fx;mz-=fz;}
      if(PRE.corrKeys.l)PRE.corrP.camY+=2.2*dt;if(PRE.corrKeys.r)PRE.corrP.camY-=2.2*dt;
      if(Math.abs(PRE.corrJX)>.06||Math.abs(PRE.corrJZ)>.06){mx+=fx*(-PRE.corrJZ)+rx*PRE.corrJX;mz+=fz*(-PRE.corrJZ)+rz*PRE.corrJX;}
      if(mx||mz){const len=Math.sqrt(mx*mx+mz*mz);const nx=PRE.corrP.x+(mx/len)*spd,nz=PRE.corrP.z+(mz/len)*spd;const map=PRE.corrMap;const bp=0.2;if(map[Math.floor(PRE.corrP.z)]&&map[Math.floor(PRE.corrP.z)][Math.floor(nx+(mx/len)*bp)]!==1)PRE.corrP.x=nx;if(map[Math.floor(nz+(mz/len)*bp)]&&map[Math.floor(nz+(mz/len)*bp)][Math.floor(PRE.corrP.x)]!==1)PRE.corrP.z=nz;}
      if(PRE.corrP.z<5&&!PRE.corrArrived){
        PRE.corrArrived=true;
        PRE.corrArrivedSet.add(myId);
        document.getElementById('corr-players-hud').textContent=t('corrArrived');
        checkAllCorrArrived();
      }
    }

    // Авто-двигаем других игроков к входу (имитация)
    PRE.otherCorrPlayers.forEach(op=>{
      if(op.arrived)return;
      op.z=Math.max(4,op.z-2.5*dt);
      if(op.z<5){op.arrived=true;PRE.corrArrivedSet.add(op.id);checkAllCorrArrived();}
    });

    renderCorridorWithPlayers(cv,PRE.corrP,PRE.corrMap,PRE.otherCorrPlayers);
  }
  requestAnimationFrame(corrLoop);
}

function checkAllCorrArrived(){
  const total=PRE.allPlayers.length;
  const arrived=PRE.corrArrivedSet.size;
  document.getElementById('corr-players-hud').textContent=
    arrived>=total?t('corrArrived'):`${arrived}/${total} ${t('corrArrived')}`;
  if(arrived>=total&&!PRE.corrAllArrived){
    PRE.corrAllArrived=true;
    setTimeout(()=>{
      if(PRE.corrLId){cancelAnimationFrame(PRE.corrLId);PRE.corrLId=null;}
      runBobikCutscene();
    },800);
  }
}

function renderCorridorWithPlayers(cv,player,map,otherPlayers){
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  const px=player.x,pz=player.z,yaw=player.camY,pitch=player.camP||0;
  const horizon=Math.floor(H/2+pitch*H*0.5);
  const SZ=map.length,SX=map[0].length;
  ctx.fillStyle='#010501';ctx.fillRect(0,0,W,horizon);
  const fg=ctx.createLinearGradient(0,horizon,0,H);fg.addColorStop(0,'#0a140a');fg.addColorStop(1,'#020602');ctx.fillStyle=fg;ctx.fillRect(0,horizon,W,H-horizon);
  const fov=Math.PI/2.5,hf=fov/2;const zB=new Float32Array(W);
  for(let col=0;col<W;col++){
    const ra=yaw-hf+(col/W)*fov;const rdx=Math.sin(ra),rdz=Math.cos(ra);
    let mx2=Math.floor(px),mz2=Math.floor(pz);
    const sx=rdx>0?1:-1,sz=rdz>0?1:-1;const ddx=Math.abs(1/rdx),ddz=Math.abs(1/rdz);
    let sdx=(rdx>0?(mx2+1-px):(px-mx2))*ddx,sdz=(rdz>0?(mz2+1-pz):(pz-mz2))*ddz;let side=0,hit=false;
    for(let s=0;s<100;s++){if(sdx<sdz){sdx+=ddx;mx2+=sx;side=0;}else{sdz+=ddz;mz2+=sz;side=1;}if(mz2<0||mz2>=SZ||mx2<0||mx2>=SX)break;if(map[mz2][mx2]===1){hit=true;break;}}
    const dist=hit?Math.max(0.001,(side===0?(sdx-ddx):(sdz-ddz))*Math.cos(ra-yaw)):40;zB[col]=dist;
    const f=Math.max(0,1-dist/18);const r=Math.floor(side===0?42*f:28*f),g2=Math.floor(side===0?58*f:40*f),b=Math.floor(side===0?28*f:18*f);
    const wh=Math.min(H*4,Math.floor(H/dist)),wt=Math.floor(horizon-wh/2);ctx.fillStyle=`rgb(${r},${g2},${b})`;ctx.fillRect(col,wt,1,Math.max(1,wh));
  }
  // Рисуем других игроков в коридоре
  if(otherPlayers){
    const ops=otherPlayers.map(op=>{const dx=op.x-px,dz=op.z-pz;return{...op,_d2:dx*dx+dz*dz};});
    ops.sort((a,b)=>b._d2-a._d2);
    ops.forEach(op=>{
      const dist=Math.sqrt(op._d2);if(dist<0.3||dist>40)return;
      let rel=Math.atan2(op.x-px,op.z-pz)-yaw;while(rel>Math.PI)rel-=Math.PI*2;while(rel<-Math.PI)rel+=Math.PI*2;
      if(Math.abs(rel)>hf*1.1)return;
      const scrX=Math.floor(W/2+(rel/hf)*(W/2));
      const sh=Math.min(H*3,Math.floor(H/dist*0.8));
      const sw=Math.floor(sh*0.5);
      const br=Math.max(0.1,1-dist/25);
      const c=hRGB(op.color||'#ff6b6b');
      for(let sx2=0;sx2<sw;sx2++){
        const cx=scrX-Math.floor(sw/2)+sx2;
        if(cx<0||cx>=W||zB[cx]<=dist)continue;
        const u=sx2/sw;
        const hh=Math.floor(sh*.22),bh=Math.floor(sh*.33),lh=Math.floor(sh*.28);
        const sTop=Math.floor(horizon-sh);
        ctx.fillStyle=`rgba(${Math.floor(c[0]*br)},${Math.floor(c[1]*br)},${Math.floor(c[2]*br)},${br})`;
        ctx.fillRect(cx,sTop,1,hh);
        ctx.fillStyle=`rgba(${Math.floor(c[0]*.6*br)},${Math.floor(c[1]*.6*br)},${Math.floor(c[2]*.6*br)},${br})`;
        ctx.fillRect(cx,sTop+hh,1,bh);
        ctx.fillStyle=`rgba(${Math.floor(20*br)},${Math.floor(20*br)},${Math.floor(50*br)},${br})`;
        ctx.fillRect(cx,sTop+hh+bh,1,lh);
      }
    });
  }
  // Ворота/выход
  if(pz<25){const eDist=pz;if(eDist>0.5){let er=Math.atan2(10-px,0.5-pz)-yaw;while(er>Math.PI)er-=Math.PI*2;while(er<-Math.PI)er+=Math.PI*2;if(Math.abs(er)<hf*1.1){const esx=Math.floor(W/2+(er/hf)*(W/2));const esh=Math.min(H*2,Math.floor(H/eDist*1.2)),esw=Math.floor(esh*0.5);const eb=Math.max(0,1-eDist/22);ctx.save();ctx.globalAlpha=eb*0.8;ctx.fillStyle='#00ff40';ctx.fillRect(esx-Math.floor(esw/2),Math.floor(horizon-esh*.9),3,esh);ctx.fillRect(esx+Math.floor(esw/2)-3,Math.floor(horizon-esh*.9),3,esh);ctx.fillRect(esx-Math.floor(esw/2),Math.floor(horizon-esh*.9),esw,3);ctx.globalAlpha=eb*0.06;ctx.fillStyle='#00ff40';ctx.fillRect(esx-Math.floor(esw/2)+3,Math.floor(horizon-esh*.9)+3,esw-6,esh-3);ctx.restore();}}}
  ctx.save();ctx.fillStyle='rgba(0,255,60,0.7)';ctx.font=`${Math.floor(H*0.06)}px VT323,monospace`;ctx.textAlign='center';ctx.fillText(t('corrArrow'),W/2,H-30);ctx.restore();
  const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.75);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.7)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  const px=player.x,pz=player.z,yaw=player.camY,pitch=player.camP||0;
  const horizon=Math.floor(H/2+pitch*H*0.5);
  const SZ=map.length,SX=map[0].length;
  ctx.fillStyle='#010501';ctx.fillRect(0,0,W,horizon);
  const fg=ctx.createLinearGradient(0,horizon,0,H);fg.addColorStop(0,'#0a140a');fg.addColorStop(1,'#020602');ctx.fillStyle=fg;ctx.fillRect(0,horizon,W,H-horizon);
  const fov=Math.PI/2.5,hf=fov/2;const zB=new Float32Array(W);
  for(let col=0;col<W;col++){
    const ra=yaw-hf+(col/W)*fov;const rdx=Math.sin(ra),rdz=Math.cos(ra);
    let mx2=Math.floor(px),mz2=Math.floor(pz);
    const sx=rdx>0?1:-1,sz=rdz>0?1:-1;const ddx=Math.abs(1/rdx),ddz=Math.abs(1/rdz);
    let sdx=(rdx>0?(mx2+1-px):(px-mx2))*ddx,sdz=(rdz>0?(mz2+1-pz):(pz-mz2))*ddz;let side=0,hit=false;
    for(let s=0;s<100;s++){if(sdx<sdz){sdx+=ddx;mx2+=sx;side=0;}else{sdz+=ddz;mz2+=sz;side=1;}if(mz2<0||mz2>=SZ||mx2<0||mx2>=SX)break;if(map[mz2][mx2]===1){hit=true;break;}}
    const dist=hit?Math.max(0.001,(side===0?(sdx-ddx):(sdz-ddz))*Math.cos(ra-yaw)):40;zB[col]=dist;
    const f=Math.max(0,1-dist/18);const r=Math.floor(side===0?42*f:28*f),g2=Math.floor(side===0?58*f:40*f),b=Math.floor(side===0?28*f:18*f);
    const wh=Math.min(H*4,Math.floor(H/dist)),wt=Math.floor(horizon-wh/2);ctx.fillStyle=`rgb(${r},${g2},${b})`;ctx.fillRect(col,wt,1,Math.max(1,wh));
  }
  if(pz<25){const eDist=pz;if(eDist>0.5){let er=Math.atan2(10-px,0.5-pz)-yaw;while(er>Math.PI)er-=Math.PI*2;while(er<-Math.PI)er+=Math.PI*2;if(Math.abs(er)<hf*1.1){const esx=Math.floor(W/2+(er/hf)*(W/2));const esh=Math.min(H*2,Math.floor(H/eDist*1.2)),esw=Math.floor(esh*0.5);const eb=Math.max(0,1-eDist/22);ctx.save();ctx.globalAlpha=eb*0.8;ctx.fillStyle='#00ff40';ctx.fillRect(esx-Math.floor(esw/2),Math.floor(horizon-esh*.9),3,esh);ctx.fillRect(esx+Math.floor(esw/2)-3,Math.floor(horizon-esh*.9),3,esh);ctx.fillRect(esx-Math.floor(esw/2),Math.floor(horizon-esh*.9),esw,3);ctx.globalAlpha=eb*0.06;ctx.fillStyle='#00ff40';ctx.fillRect(esx-Math.floor(esw/2)+3,Math.floor(horizon-esh*.9)+3,esw-6,esh-3);ctx.restore();}}}
  ctx.save();ctx.fillStyle='rgba(0,255,60,0.7)';ctx.font=`${Math.floor(H*0.06)}px VT323,monospace`;ctx.textAlign='center';ctx.fillText(t('corrArrow'),W/2,H-30);ctx.restore();
  const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.75);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.7)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function setupCorridorControls(){
  const jz=document.getElementById('jz2'),kn=document.getElementById('jk2'),KR=55;let jPtr=null;
  function uJoy(e){const r=jz.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=e.clientX-cx,dy=e.clientY-cy;const len=Math.sqrt(dx*dx+dy*dy),cl=Math.min(len,KR);if(len>0){dx=dx/len*cl;dy=dy/len*cl;}kn.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;PRE.corrJX=dx/KR;PRE.corrJZ=dy/KR;}
  function jR(e){if(e.pointerId===jPtr){jPtr=null;PRE.corrJX=0;PRE.corrJZ=0;kn.style.transform='translate(-50%,-50%)';}}
  jz.addEventListener('pointerdown',e=>{e.preventDefault();jPtr=e.pointerId;jz.setPointerCapture(e.pointerId);uJoy(e);},{passive:false});
  jz.addEventListener('pointermove',e=>{if(e.pointerId!==jPtr)return;e.preventDefault();uJoy(e);},{passive:false});
  jz.addEventListener('pointerup',jR,{passive:false});jz.addEventListener('pointercancel',jR,{passive:false});

  const cc=document.getElementById('corr-canvas');
  // Мышь — pointer lock
  cc.addEventListener('click',()=>{cc.requestPointerLock&&cc.requestPointerLock();});
  cc.addEventListener('mousemove',e=>{
    if(document.pointerLockElement===cc){
      PRE.corrP.camY+=e.movementX*0.003;
      PRE.corrP.camP=Math.max(-.5,Math.min(.5,(PRE.corrP.camP||0)-e.movementY*0.002));
    }
  });
  // Touch drag
  const camPtrs=new Map();
  cc.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse')return;const el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.closest('#ctrl2'))return;cc.setPointerCapture(e.pointerId);camPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});},{passive:true});
  cc.addEventListener('pointermove',e=>{if(e.pointerType==='mouse')return;if(!camPtrs.has(e.pointerId))return;const prev=camPtrs.get(e.pointerId);PRE.corrP.camY+=(e.clientX-prev.x)*0.008;PRE.corrP.camP=Math.max(-.5,Math.min(.5,(PRE.corrP.camP||0)-(e.clientY-prev.y)*0.004));camPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});},{passive:true});
  cc.addEventListener('pointerup',e=>{camPtrs.delete(e.pointerId);},{passive:true});
  cc.addEventListener('pointercancel',e=>{camPtrs.delete(e.pointerId);},{passive:true});

  // Клавиатура
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')PRE.corrKeys.u=true;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')PRE.corrKeys.d=true;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')PRE.corrKeys.l=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')PRE.corrKeys.r=true;
    if(e.key==='PageUp')PRE.corrP.camP=Math.min(.5,(PRE.corrP.camP||0)+.06);
    if(e.key==='PageDown')PRE.corrP.camP=Math.max(-.5,(PRE.corrP.camP||0)-.06);
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')PRE.corrKeys.u=false;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')PRE.corrKeys.d=false;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')PRE.corrKeys.l=false;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')PRE.corrKeys.r=false;
  });
}

// ─── BOBIK CUTSCENE ───
function runBobikCutscene(){
  showScreen('screen-bobik-cs');
  const cv=document.getElementById('bobik-cs-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const dlEl=document.getElementById('bobik-dialog');
  const players=PRE.allPlayers;
  function pName(i){return players[i%players.length]?.name||t('defaultPlayer');}

  let bobX=cv.width+150, bobTargX=cv.width*0.55;
  let tp=0;

  function showDlg(text, color, duration, cb){dlEl.style.display='block';dlEl.style.color=color||'#c8d8b0';dlEl.innerHTML=text;if(cb)setTimeout(()=>{dlEl.style.display='none';setTimeout(cb,300);},duration);}
  function hideDlg(cb){dlEl.style.display='none';if(cb)setTimeout(cb,300);}

  const allNames = players.map(p=>p.name).join(', ');
  const dialogs=[
    {delay:1200, text:t('bobD0'), dur:3800, col:'#a0ffa0'},
    {delay:500,  text:t('bobD1', pName(0)), dur:3200, col:'#c8d8b0'},
    {delay:400,  text:t('bobD2'), dur:3200, col:'#a0ffa0', moveForward:true},
    {delay:400,  text:t('bobD3', pName(1)), dur:4800, col:'#c8d8b0'},
    {delay:400,  text:t('bobD4'), dur:3000, col:'#a0ffa0'},
    {delay:400,  text:t('bobD5', allNames), dur:2000, col:'#ffe08a'},
    {delay:300,  text:t('bobD6'), dur:3500, col:'#a0ffa0', moveBack:true},
    {delay:200,  text:`<span style="color:#ff3030;font-size:1.25rem;font-weight:bold">${t('bobD7')}</span>`, dur:4500, col:'#ff3030'},
    {delay:300,  text:t('bobD8'), dur:4000, col:'#a0ffa0'},
    {delay:400,  text:t('bobD9', pName(0)), dur:2500, col:'#c8d8b0'},
  ];
  let dIdx=0;
  function runNext(){
    if(dIdx>=dialogs.length){hideDlg(()=>startTutorial());return;}
    const d=dialogs[dIdx++];
    if(d.moveForward){bobTargX=cv.width*0.45;}
    if(d.moveBack){bobTargX=cv.width*0.68;}
    setTimeout(()=>showDlg(d.text,d.col,d.dur,runNext),d.delay);
  }
  setTimeout(runNext,600);

  let animId;
  function draw(){
    animId=requestAnimationFrame(draw);tp+=0.016;
    const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#010601');bg.addColorStop(1,'#000');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let i=0;i<12;i++){const tx=(i/12)*W+(i%2?0:W*0.04);const th=H*(0.4+((i*37)%30)/100);const tw=W*0.05;ctx.fillStyle=`rgb(${4+(i%3)*2},${12+(i%4)*3},${4+(i%3)*2})`;ctx.beginPath();ctx.moveTo(tx,H*0.9);ctx.lineTo(tx-tw/2,H*0.9-th*0.3);ctx.lineTo(tx-tw,H*0.9-th*0.5);ctx.lineTo(tx-tw*0.6,H*0.9-th*0.5);ctx.lineTo(tx-tw*0.8,H*0.9-th*0.8);ctx.lineTo(tx-tw*0.3,H*0.9-th*0.75);ctx.lineTo(tx,H*0.9-th);ctx.lineTo(tx+tw*0.3,H*0.9-th*0.75);ctx.lineTo(tx+tw*0.8,H*0.9-th*0.8);ctx.lineTo(tx+tw*0.6,H*0.9-th*0.5);ctx.lineTo(tx+tw,H*0.9-th*0.5);ctx.lineTo(tx+tw/2,H*0.9-th*0.3);ctx.closePath();ctx.fill();}
    ctx.fillStyle='#030a03';ctx.fillRect(0,H*0.88,W,H*0.12);
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.beginPath();ctx.arc(W*0.15,H*0.12,H*0.055,0,Math.PI*2);ctx.fill();
    const moonG=ctx.createRadialGradient(W*0.15,H*0.12,0,W*0.15,H*0.12,H*0.12);moonG.addColorStop(0,'rgba(200,220,255,0.12)');moonG.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=moonG;ctx.fillRect(0,0,W,H*0.35);
    const gateX=W*0.3;const gateH=H*0.55;ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle='#003300';ctx.fillRect(gateX-4,H*0.35,8,gateH);ctx.fillRect(gateX+W*0.12-4,H*0.35,8,gateH);ctx.fillRect(gateX-4,H*0.35,W*0.12+8,6);ctx.globalAlpha=0.08;ctx.fillStyle='#00ff40';ctx.fillRect(gateX,H*0.36,W*0.12,gateH);ctx.restore();
    bobX+=(bobTargX-bobX)*0.06;
    const bH=Math.min(H*0.6,300);const bW=bH*(PRE.bobikImg.naturalWidth/Math.max(1,PRE.bobikImg.naturalHeight)||1);const bY=H*0.88-bH;const bobOff=Math.sin(tp*3)*5;
    if(PRE.bobikImg.complete&&PRE.bobikImg.naturalWidth>0){ctx.drawImage(PRE.bobikImg,bobX-bW/2,bY+bobOff,bW,bH);}
    else{ctx.save();ctx.globalAlpha=0.9;ctx.fillStyle='#f0d030';ctx.beginPath();ctx.roundRect(bobX-bW/2,bY+bobOff,bW,bH,12);ctx.fill();ctx.fillStyle='#000';ctx.font=`${bH*0.3}px Arial`;ctx.textAlign='center';ctx.fillText('👾',bobX,bY+bobOff+bH*0.65);ctx.restore();}
    const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.82);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.72)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }
  requestAnimationFrame(draw);
  window._bobikCleanup=()=>{if(animId)cancelAnimationFrame(animId);};
}

// ─── TUTORIAL ───
function startTutorial(){
  if(window._bobikCleanup){window._bobikCleanup();window._bobikCleanup=null;}
  showScreen('screen-tutorial');
  document.getElementById('tut-title').textContent = t('tutTitle');
  document.getElementById('tut-content').innerHTML = t('tutContent');
  let n=10;
  const el=document.getElementById('tut-timer');
  el.textContent=n;
  const iv=setInterval(()=>{n--;el.textContent=n;if(n<=0){clearInterval(iv);runIntro(()=>startGC());}},1000);
}

function endGame(won){
  if(AU.bg)AU.bg.pause();if(AU.escape)AU.escape.pause();
  if(G.monIv)clearInterval(G.monIv);if(G.fallIv)clearInterval(G.fallIv);
  document.getElementById('et2').textContent=won?t('wonTitle'):t('lostTitle');
  document.getElementById('et2').style.color=won?'#4ac84a':'#ff3030';
  document.getElementById('em').textContent=won?t('wonMsg'):t('lostMsg');
  document.getElementById('btn-menu').textContent=t('btnMenu');
  showScreen('screen-end');
}
